<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #7c6ef7;
    --accent2: #a599f5;
    --income: #3ecf8e;
    --expense: #f06b6b;
    --radius: 10px;
    --font: 'Inter', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    min-height: 100vh;
  }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent2); }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    padding: 8px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font);
  }

  .btn:hover { border-color: var(--accent); color: var(--accent2); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  .main { max-width: 1200px; margin: 0 auto; padding: 32px; }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    padding: 48px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 32px;
  }

  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(124,110,247,0.05); }
  .upload-zone.hidden { display: none; }

  .upload-icon { font-size: 36px; margin-bottom: 12px; }
  .upload-title { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .upload-sub { color: var(--muted); font-size: 13px; }

  #fileInput { display: none; }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .stat-label { color: var(--muted); font-size: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
  .stat-value.income { color: var(--income); }
  .stat-value.expense { color: var(--expense); }
  .stat-value.balance.pos { color: var(--income); }
  .stat-value.balance.neg { color: var(--expense); }

  /* Charts */
  .charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
  }

  .chart-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .chart-title { font-weight: 500; margin-bottom: 16px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .toolbar input[type=text] {
    padding: 8px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: var(--font);
    width: 220px;
  }

  .toolbar input[type=text]:focus { outline: none; border-color: var(--accent); }

  .toolbar select {
    padding: 8px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
  }

  .toolbar select:focus { outline: none; border-color: var(--accent); }

  .count { margin-left: auto; color: var(--muted); font-size: 13px; }

  /* Table */
  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    overflow-x: auto;
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 11px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .amount-income { color: var(--income); font-weight: 500; }
  .amount-expense { color: var(--expense); font-weight: 500; }

  .cat-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cat-badge:hover { border-color: var(--accent); color: var(--accent2); }

  .cat-select {
    background: var(--bg3);
    border: 1px solid var(--accent);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 3px 6px;
    font-family: var(--font);
    cursor: pointer;
    max-width: 160px;
  }

  .status-ok { color: var(--income); font-size: 12px; }
  .status-pend { color: #f5a623; font-size: 12px; }

  .desc-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .date-cell { color: var(--muted); white-space: nowrap; }

  /* GitHub modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 420px;
    max-width: 90vw;
  }

  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .field input {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: var(--font);
  }

  .field input:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.ok { background: #1a3a2a; border: 1px solid #3ecf8e; color: var(--income); }
  .toast.err { background: #3a1a1a; border: 1px solid #f06b6b; color: var(--expense); }
  .toast.show { opacity: 1; }

  .section-hidden { display: none; }

  .empty {
    text-align: center;
    padding: 60px;
    color: var(--muted);
  }

  @media (max-width: 768px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .charts { grid-template-columns: 1fr; }
    header { padding: 16px; }
    .main { padding: 16px; }
    .upload-zone { padding: 32px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">finance<span>.</span>tracker</div>
  <div class="header-actions">
    <button class="btn" id="btnClearData" style="display:none">Очистить данные</button>
    <button class="btn" id="btnGithubSettings">⚙ GitHub</button>
    <button class="btn primary" id="btnSave" style="display:none">Сохранить в GitHub</button>
  </div>
</header>

<div class="main">

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">📂</div>
    <div class="upload-title">Загрузить выписку банка</div>
    <div class="upload-sub">CSV или Excel · Тинькофф, ВТБ, Сбер и другие</div>
    <br>
    <button class="btn primary" onclick="document.getElementById('fileInput').click()">Выбрать файл</button>
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
  </div>

  <!-- Stats -->
  <div class="stats section-hidden" id="statsBlock">
    <div class="stat">
      <div class="stat-label">Доходы</div>
      <div class="stat-value income" id="statIncome">0 ₽</div>
    </div>
    <div class="stat">
      <div class="stat-label">Расходы</div>
      <div class="stat-value expense" id="statExpense">0 ₽</div>
    </div>
    <div class="stat">
      <div class="stat-label">Баланс</div>
      <div class="stat-value balance" id="statBalance">0 ₽</div>
    </div>
    <div class="stat">
      <div class="stat-label">Операций</div>
      <div class="stat-value" id="statCount">0</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts section-hidden" id="chartsBlock">
    <div class="chart-card">
      <div class="chart-title">По категориям (расходы)</div>
      <canvas id="chartPie" height="220"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">По дням</div>
      <canvas id="chartLine" height="220"></canvas>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar section-hidden" id="toolbarBlock">
    <input type="text" id="searchInput" placeholder="Поиск по описанию...">
    <select id="filterCat">
      <option value="">Все категории</option>
    </select>
    <select id="filterType">
      <option value="">Доходы и расходы</option>
      <option value="income">Только доходы</option>
      <option value="expense">Только расходы</option>
    </select>
    <button class="btn" id="btnAddFile" title="Добавить ещё файл">+ Добавить файл</button>
    <span class="count" id="rowCount"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap section-hidden" id="tableBlock">
    <table>
      <thead>
        <tr>
          <th>Дата</th>
          <th>Описание</th>
          <th>Категория</th>
          <th>Сумма (оп.)</th>
          <th>Сумма (RUB)</th>
          <th>Статус</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<!-- GitHub modal -->
<div class="modal-overlay" id="githubModal">
  <div class="modal">
    <h3>Настройки GitHub</h3>
    <div class="field">
      <label>GitHub Username</label>
      <input type="text" id="ghUser" placeholder="iambescen">
    </div>
    <div class="field">
      <label>Репозиторий</label>
      <input type="text" id="ghRepo" placeholder="finance-tracker">
    </div>
    <div class="field">
      <label>Personal Access Token</label>
      <input type="password" id="ghToken" placeholder="ghp_...">
    </div>
    <div class="modal-actions">
      <button class="btn" id="btnModalClose">Отмена</button>
      <button class="btn primary" id="btnModalSave">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
  'Продукты','Рестораны','Кафе','Кофе','Транспорт','Такси','АЗС','Авто',
  'Здоровье','Аптека','Одежда','Электроника','Развлечения','Путешествия',
  'Отели','Жильё','Коммунальные','Связь','Интернет','Подписки','Цифровые товары',
  'Переводы','Доход','Зарплата','Кэшбэк','Бонусы','Финансы','Другое'
];

const CAT_MAP = {
  'супермаркет':'Продукты','пятёрочка':'Продукты','магнит':'Продукты','вкусвилл':'Продукты',
  'пятерочка':'Продукты','доставка':'Продукты',
  'ресторан':'Рестораны','кафе':'Кафе','васильки':'Рестораны','кофе':'Кофе',
  'такси':'Такси','яндекс такси':'Такси','убер':'Такси',
  'тройка':'Транспорт','метро':'Транспорт','автобус':'Транспорт','сбертройка':'Транспорт',
  'аптека':'Аптека','здоровье':'Здоровье',
  'отель':'Отели','суточно':'Отели','гостиница':'Отели','booking':'Отели',
  'afisha':'Развлечения','афиша':'Развлечения','кино':'Развлечения',
  'мобайл':'Связь','мобильная':'Связь','beget':'Интернет','интернет':'Интернет',
  'цифров':'Подписки','onlipay':'Подписки','cozypay':'Подписки',
  'emex':'Авто','автоуслуги':'Авто',
  'сравни':'Финансы',
  'зачисление кэшбэка':'Кэшбэк','кэшбэк':'Кэшбэк','бонус':'Бонусы',
  'между своими':'Переводы','перевод':'Переводы',
  'зарплата':'Зарплата','оклад':'Зарплата',
};

let transactions = [];
let chartPie = null, chartLine = null;

function guessCategory(desc, bankCat) {
  const d = (desc || '').toLowerCase();
  const b = (bankCat || '').toLowerCase();
  for (const [key, val] of Object.entries(CAT_MAP)) {
    if (d.includes(key) || b.includes(key)) return val;
  }
  if (b === 'переводы') return 'Переводы';
  if (b === 'бонусы') return 'Бонусы';
  if (b === 'рестораны') return 'Рестораны';
  if (b === 'супермаркеты') return 'Продукты';
  if (b === 'такси') return 'Такси';
  if (b === 'местный транспорт') return 'Транспорт';
  if (b === 'отели') return 'Отели';
  if (b === 'развлечения') return 'Развлечения';
  if (b === 'автоуслуги') return 'Авто';
  if (b === 'финансы') return 'Финансы';
  if (b === 'связь') return 'Связь';
  if (b === 'цифровые товары') return 'Подписки';
  return 'Другое';
}

function parseAmount(str) {
  if (!str) return 0;
  return parseFloat(String(str).replace(/\s/g,'').replace(',','.')) || 0;
}

function parseTinkoff(rows) {
  const result = [];
  for (const r of rows) {
    const keys = Object.keys(r);
    if (keys.length < 5) continue;
    const dateRaw = r['Дата операции'] || r[keys[0]] || '';
    const status = r['Статус'] || '';
    const amountOp = parseAmount(r['Сумма операции'] || r[keys[4]]);
    const currOp = r['Валюта операции'] || 'RUB';
    const amountRub = parseAmount(r['Сумма платежа'] || r[keys[6]]);
    const bankCat = r['Категория'] || '';
    const desc = r['Описание'] || '';
    const card = r['Номер карты'] || '';
    if (!dateRaw || isNaN(amountOp)) continue;
    const dateParts = dateRaw.split(' ')[0].split('.');
    const dateISO = dateParts.length === 3
      ? `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`
      : dateRaw;
    result.push({
      id: Math.random().toString(36).slice(2),
      date: dateISO,
      dateDisplay: dateRaw.split(' ')[0],
      desc,
      card,
      amountOp,
      currOp,
      amountRub,
      status,
      bankCat,
      category: guessCategory(desc, bankCat),
      source: 'tinkoff'
    });
  }
  return result;
}

function parseGeneric(rows) {
  const result = [];
  for (const r of rows) {
    const vals = Object.values(r);
    const keys = Object.keys(r);
    let date = '', desc = '', amount = 0, cat = '';
    for (const k of keys) {
      const kl = k.toLowerCase();
      if (kl.includes('дат')) date = r[k];
      else if (kl.includes('опис') || kl.includes('назн') || kl.includes('получ')) desc = r[k];
      else if (kl.includes('сумм') || kl.includes('amount')) amount = parseAmount(r[k]);
      else if (kl.includes('катег') || kl.includes('category')) cat = r[k];
    }
    if (!date && vals[0]) date = vals[0];
    if (!desc && vals[1]) desc = vals[1];
    if (!amount && vals[2]) amount = parseAmount(vals[2]);
    if (isNaN(amount) || !date) continue;
    const dateParts = String(date).split(' ')[0].split('.');
    const dateISO = dateParts.length === 3
      ? `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`
      : String(date);
    result.push({
      id: Math.random().toString(36).slice(2),
      date: dateISO,
      dateDisplay: String(date).split(' ')[0],
      desc: String(desc),
      card: '',
      amountOp: amount,
      currOp: 'RUB',
      amountRub: amount,
      status: 'OK',
      bankCat: cat,
      category: guessCategory(String(desc), cat),
      source: 'generic'
    });
  }
  return result;
}

function detectAndParse(rows) {
  if (!rows || rows.length === 0) return [];
  const keys = Object.keys(rows[0] || {});
  const isTinkoff = keys.some(k => k.includes('Дата операции') || k.includes('Сумма операции'));
  return isTinkoff ? parseTinkoff(rows) : parseGeneric(rows);
}

function processFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result;
      const result = Papa.parse(text, {
        header: true,
        delimiter: ';',
        skipEmptyLines: true,
        encoding: 'UTF-8'
      });
      if (!result.data || result.data.length === 0) {
        const result2 = Papa.parse(text, { header: true, skipEmptyLines: true });
        addTransactions(detectAndParse(result2.data));
      } else {
        addTransactions(detectAndParse(result.data));
      }
    };
    reader.readAsText(file, 'UTF-8');
  } else {
    const reader = new FileReader();
    reader.onload = e => {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      addTransactions(detectAndParse(rows));
    };
    reader.readAsArrayBuffer(file);
  }
}

function addTransactions(newItems) {
  const existIds = new Set(transactions.map(t => t.date + t.desc + t.amountOp));
  const deduped = newItems.filter(t => !existIds.has(t.date + t.desc + t.amountOp));
  transactions = [...transactions, ...deduped].sort((a,b) => b.date.localeCompare(a.date));
  saveLocal();
  render();
  showSections();
  toast(`Загружено ${deduped.length} операций`, 'ok');
}

function showSections() {
  ['statsBlock','chartsBlock','toolbarBlock','tableBlock'].forEach(id => {
    document.getElementById(id).classList.remove('section-hidden');
  });
  document.getElementById('uploadZone').classList.add('hidden');
  document.getElementById('btnSave').style.display = '';
  document.getElementById('btnClearData').style.display = '';
}

function fmt(n, cur) {
  const v = Math.abs(n).toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  return v + ' ' + (cur || '₽');
}

function render() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filterCat = document.getElementById('filterCat').value;
  const filterType = document.getElementById('filterType').value;

  let filtered = transactions.filter(t => {
    if (search && !t.desc.toLowerCase().includes(search) && !t.category.toLowerCase().includes(search)) return false;
    if (filterCat && t.category !== filterCat) return false;
    if (filterType === 'income' && t.amountRub <= 0) return false;
    if (filterType === 'expense' && t.amountRub >= 0) return false;
    return true;
  });

  document.getElementById('rowCount').textContent = `${filtered.length} из ${transactions.length}`;

  const income = transactions.filter(t=>t.amountRub>0).reduce((s,t)=>s+t.amountRub,0);
  const expense = transactions.filter(t=>t.amountRub<0).reduce((s,t)=>s+t.amountRub,0);
  const balance = income + expense;

  document.getElementById('statIncome').textContent = fmt(income);
  document.getElementById('statExpense').textContent = fmt(expense);
  const balEl = document.getElementById('statBalance');
  balEl.textContent = (balance >= 0 ? '+' : '') + fmt(balance);
  balEl.className = 'stat-value balance ' + (balance >= 0 ? 'pos' : 'neg');
  document.getElementById('statCount').textContent = transactions.length;

  const cats = [...new Set(transactions.map(t=>t.category))].sort();
  const sel = document.getElementById('filterCat');
  const prev = sel.value;
  sel.innerHTML = '<option value="">Все категории</option>' +
    cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  sel.value = prev;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  for (const t of filtered) {
    const isIncome = t.amountRub > 0;
    const amtClass = isIncome ? 'amount-income' : 'amount-expense';
    const sign = isIncome ? '+' : '';
    const statusHtml = t.status === 'OK'
      ? '<span class="status-ok">✓</span>'
      : `<span class="status-pend">${t.status||'—'}</span>`;
    const opStr = t.currOp !== 'RUB'
      ? `<span class="${amtClass}">${sign}${fmt(t.amountOp, t.currOp)}</span>`
      : '—';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="date-cell">${t.dateDisplay}</td>
      <td class="desc-cell" title="${t.desc}">${t.desc}</td>
      <td><span class="cat-badge" data-id="${t.id}" title="${t.category}">${t.category}</span></td>
      <td>${opStr}</td>
      <td class="${amtClass}">${sign}${fmt(t.amountRub)}</td>
      <td>${statusHtml}</td>
    `;
    tbody.appendChild(tr);
  }

  renderCharts(transactions);
}

function renderCharts(txns) {
  const expByCat = {};
  for (const t of txns) {
    if (t.amountRub < 0) {
      expByCat[t.category] = (expByCat[t.category] || 0) + Math.abs(t.amountRub);
    }
  }
  const sortedCats = Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const pieLabels = sortedCats.map(e=>e[0]);
  const pieData = sortedCats.map(e=>Math.round(e[1]));
  const COLORS = ['#7c6ef7','#3ecf8e','#f06b6b','#f5a623','#4ecdc4','#a78bfa','#fb7185','#34d399'];

  if (chartPie) chartPie.destroy();
  chartPie = new Chart(document.getElementById('chartPie'), {
    type: 'doughnut',
    data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: COLORS, borderWidth: 0 }] },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'right', labels: { color: '#888', font: { size: 11 }, boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed.toLocaleString('ru-RU')} ₽` } }
      }
    }
  });

  const byDay = {};
  for (const t of txns) {
    if (!byDay[t.date]) byDay[t.date] = { inc: 0, exp: 0 };
    if (t.amountRub > 0) byDay[t.date].inc += t.amountRub;
    else byDay[t.date].exp += Math.abs(t.amountRub);
  }
  const days = Object.keys(byDay).sort();
  const incData = days.map(d => Math.round(byDay[d].inc));
  const expData = days.map(d => Math.round(byDay[d].exp));
  const dayLabels = days.map(d => d.slice(5).replace('-','.'));

  if (chartLine) chartLine.destroy();
  chartLine = new Chart(document.getElementById('chartLine'), {
    type: 'bar',
    data: {
      labels: dayLabels,
      datasets: [
        { label: 'Доходы', data: incData, backgroundColor: 'rgba(62,207,142,0.7)', borderRadius: 4 },
        { label: 'Расходы', data: expData, backgroundColor: 'rgba(240,107,107,0.7)', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true,
      scales: {
        x: { ticks: { color: '#666', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#666', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
      },
      plugins: { legend: { labels: { color: '#888', font: { size: 11 } } } }
    }
  });
}

document.getElementById('tableBody').addEventListener('click', e => {
  const badge = e.target.closest('.cat-badge');
  if (!badge) return;
  const id = badge.dataset.id;
  const sel = document.createElement('select');
  sel.className = 'cat-select';
  sel.innerHTML = CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('');
  const t = transactions.find(x=>x.id===id);
  if (!t) return;
  sel.value = t.category;
  badge.replaceWith(sel);
  sel.focus();
  const commit = () => {
    t.category = sel.value;
    saveLocal();
    const newBadge = document.createElement('span');
    newBadge.className = 'cat-badge';
    newBadge.dataset.id = id;
    newBadge.title = t.category;
    newBadge.textContent = t.category;
    sel.replaceWith(newBadge);
    renderCharts(transactions);
  };
  sel.addEventListener('change', commit);
  sel.addEventListener('blur', commit);
});

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('filterCat').addEventListener('change', render);
document.getElementById('filterType').addEventListener('change', render);

const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
uploadZone.addEventListener('click', () => document.getElementById('fileInput').click());

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
  e.target.value = '';
});

document.getElementById('btnAddFile').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('btnClearData').addEventListener('click', () => {
  if (!confirm('Удалить все загруженные данные?')) return;
  transactions = [];
  saveLocal();
  ['statsBlock','chartsBlock','toolbarBlock','tableBlock'].forEach(id => {
    document.getElementById(id).classList.add('section-hidden');
  });
  document.getElementById('uploadZone').classList.remove('hidden');
  document.getElementById('btnSave').style.display = 'none';
  document.getElementById('btnClearData').style.display = 'none';
});

function saveLocal() {
  try { localStorage.setItem('ft_transactions', JSON.stringify(transactions)); } catch(e) {}
}

function loadLocal() {
  try {
    const d = localStorage.getItem('ft_transactions');
    if (d) { transactions = JSON.parse(d); if (transactions.length) { render(); showSections(); } }
  } catch(e) {}
}

function ghSettings() {
  return {
    user: localStorage.getItem('gh_user') || '',
    repo: localStorage.getItem('gh_repo') || '',
    token: localStorage.getItem('gh_token') || ''
  };
}

document.getElementById('btnGithubSettings').addEventListener('click', () => {
  const s = ghSettings();
  document.getElementById('ghUser').value = s.user;
  document.getElementById('ghRepo').value = s.repo;
  document.getElementById('ghToken').value = s.token;
  document.getElementById('githubModal').classList.add('open');
});

document.getElementById('btnModalClose').addEventListener('click', () => {
  document.getElementById('githubModal').classList.remove('open');
});

document.getElementById('btnModalSave').addEventListener('click', () => {
  localStorage.setItem('gh_user', document.getElementById('ghUser').value.trim());
  localStorage.setItem('gh_repo', document.getElementById('ghRepo').value.trim());
  localStorage.setItem('gh_token', document.getElementById('ghToken').value.trim());
  document.getElementById('githubModal').classList.remove('open');
  toast('Настройки сохранены', 'ok');
});

document.getElementById('githubModal').addEventListener('click', e => {
  if (e.target === document.getElementById('githubModal')) {
    document.getElementById('githubModal').classList.remove('open');
  }
});

document.getElementById('btnSave').addEventListener('click', async () => {
  const s = ghSettings();
  if (!s.user || !s.repo || !s.token) {
    toast('Сначала настройте GitHub', 'err');
    document.getElementById('githubModal').classList.add('open');
    return;
  }
  const btn = document.getElementById('btnSave');
  btn.textContent = 'Сохраняем...';
  btn.disabled = true;
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify({ transactions, savedAt: new Date().toISOString() }, null, 2))));
    const checkRes = await fetch(`https://api.github.com/repos/${s.user}/${s.repo}/contents/data.json`, {
      headers: { Authorization: `token ${s.token}`, Accept: 'application/vnd.github.v3+json' }
    });
    let sha = undefined;
    if (checkRes.ok) { const j = await checkRes.json(); sha = j.sha; }
    const body = { message: `Update transactions ${new Date().toLocaleDateString('ru-RU')}`, content };
    if (sha) body.sha = sha;
    const res = await fetch(`https://api.github.com/repos/${s.user}/${s.repo}/contents/data.json`, {
      method: 'PUT',
      headers: { Authorization: `token ${s.token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.ok) { toast('Сохранено в GitHub!', 'ok'); }
    else { const j = await res.json(); toast('Ошибка: ' + (j.message || res.status), 'err'); }
  } catch(e) { toast('Ошибка сети', 'err'); }
  btn.textContent = 'Сохранить в GitHub';
  btn.disabled = false;
});

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

loadLocal();
</script>
</body>
</html>
