<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Семейные финансы</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0a0a;
  --bg2:#111111;
  --bg3:#1a1a1a;
  --bg4:#222222;
  --border:#2a2a2a;
  --border2:#333333;
  --text:#e8e8e8;
  --muted:#666;
  --muted2:#888;
  --accent:#6366f1;
  --accent-soft:rgba(99,102,241,0.12);
  --income:#22c55e;
  --income-soft:rgba(34,197,94,0.1);
  --expense:#ef4444;
  --expense-soft:rgba(239,68,68,0.1);
  --transfer:#f59e0b;
  --transfer-soft:rgba(245,158,11,0.1);
  --r:8px;
  --r2:12px;
  --font:'Inter',system-ui,sans-serif;
}

body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}

/* ── Layout ── */
.app{display:grid;grid-template-rows:56px 1fr;height:100vh}
.topbar{
  display:flex;align-items:center;gap:16px;
  padding:0 24px;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.logo{font-size:15px;font-weight:600;letter-spacing:-0.3px;color:var(--text)}
.logo em{color:var(--accent);font-style:normal}
.topbar-period{display:flex;align-items:center;gap:6px;margin-left:auto}
.topbar-period select{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-size:13px;font-family:var(--font);padding:5px 10px;cursor:pointer
}
.body{display:grid;grid-template-columns:220px 1fr;overflow:hidden}
.sidebar{
  background:var(--bg2);border-right:1px solid var(--border);
  padding:16px 0;overflow-y:auto;
}
.content{overflow-y:auto;padding:24px}

/* ── Sidebar nav ── */
.nav-section{padding:0 12px;margin-bottom:4px}
.nav-label{font-size:10px;font-weight:500;letter-spacing:0.8px;color:var(--muted);text-transform:uppercase;padding:8px 8px 4px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:var(--r);cursor:pointer;color:var(--muted2);font-size:13px;
  transition:all 0.15s;margin-bottom:1px;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent)}
.nav-item .icon{width:16px;text-align:center;font-size:14px}
.nav-divider{height:1px;background:var(--border);margin:8px 12px}

/* ── Cards & Grids ── */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.card-title{font-size:11px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

.metric-label{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px}
.metric-value{font-size:22px;font-weight:600;letter-spacing:-0.5px}
.metric-sub{font-size:12px;color:var(--muted);margin-top:4px}
.metric-value.income{color:var(--income)}
.metric-value.expense{color:var(--expense)}
.metric-value.accent{color:var(--accent)}
.delta{font-size:12px;margin-top:4px}
.delta.up{color:var(--income)}
.delta.down{color:var(--expense)}

/* ── Page header ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.page-actions{display:flex;gap:8px}

/* ── Buttons ── */
.btn{
  padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);
  background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;
  transition:all 0.15s;font-family:var(--font);display:inline-flex;align-items:center;gap:6px
}
.btn:hover{border-color:var(--border2);background:var(--bg4)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{opacity:0.9}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.danger{border-color:#7f1d1d;color:var(--expense)}
.btn.danger:hover{background:var(--expense-soft)}

/* ── Upload ── */
.upload-area{
  border:1.5px dashed var(--border2);border-radius:var(--r2);
  padding:40px;text-align:center;cursor:pointer;transition:all 0.2s;
  background:var(--bg2);
}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:var(--accent-soft)}
.upload-icon{font-size:32px;margin-bottom:12px}
.upload-title{font-size:15px;font-weight:500;margin-bottom:6px}
.upload-sub{color:var(--muted);font-size:13px;line-height:1.6}
#fileInput{display:none}

/* ── Period tabs ── */
.period-list{display:flex;flex-direction:column;gap:2px;padding:0 12px}
.period-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;border-radius:var(--r);cursor:pointer;
  font-size:13px;color:var(--muted2);transition:all 0.15s;
}
.period-item:hover{background:var(--bg3);color:var(--text)}
.period-item.active{background:var(--accent-soft);color:var(--accent)}
.period-item .badge{
  font-size:10px;padding:2px 6px;border-radius:20px;
  background:var(--bg4);color:var(--muted)
}
.period-item.active .badge{background:var(--accent-soft);color:var(--accent)}

/* ── Table ── */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.table-toolbar{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.table-toolbar input{
  padding:6px 12px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font);width:200px
}
.table-toolbar input:focus{outline:none;border-color:var(--accent)}
.table-toolbar select{
  padding:6px 12px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font);cursor:pointer
}
.table-toolbar select:focus{outline:none;border-color:var(--accent)}
.tbl-count{margin-left:auto;font-size:12px;color:var(--muted)}

table{width:100%;border-collapse:collapse}
th{
  text-align:left;padding:10px 14px;font-size:11px;
  text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);
  border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500
}
td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.015)}

.amt-income{color:var(--income);font-weight:500;font-variant-numeric:tabular-nums}
.amt-expense{color:var(--expense);font-weight:500;font-variant-numeric:tabular-nums}
.amt-transfer{color:var(--transfer);font-weight:500;font-variant-numeric:tabular-nums}
.amt-neutral{color:var(--muted2);font-variant-numeric:tabular-nums}

/* ── Category badge ── */
.cat-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:20px;font-size:12px;
  background:var(--bg3);border:1px solid var(--border);
  cursor:pointer;transition:all 0.15s;max-width:180px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.cat-pill:hover{border-color:var(--accent);color:var(--accent)}
.cat-pill.transfer{background:var(--transfer-soft);border-color:rgba(245,158,11,0.2);color:var(--transfer)}
.cat-select{
  background:var(--bg3);border:1px solid var(--accent);border-radius:var(--r);
  color:var(--text);font-size:12px;padding:3px 6px;font-family:var(--font);
  cursor:pointer;max-width:200px
}

/* ── Type tag ── */
.type-tag{
  display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500
}
.type-tag.income{background:var(--income-soft);color:var(--income)}
.type-tag.expense{background:var(--expense-soft);color:var(--expense)}
.type-tag.transfer{background:var(--transfer-soft);color:var(--transfer)}

/* ── Account tag ── */
.acc-tag{
  font-size:11px;color:var(--muted);
  border:1px solid var(--border);border-radius:20px;
  padding:2px 7px;white-space:nowrap
}

/* ── P&L table ── */
.pl-section{margin-bottom:8px}
.pl-row{
  display:grid;grid-template-columns:1fr 120px 120px 120px;
  padding:8px 14px;border-radius:var(--r);transition:background 0.1s;cursor:default
}
.pl-row:hover{background:var(--bg3)}
.pl-row.group{font-weight:500;color:var(--text);padding:10px 14px}
.pl-row.group:hover{background:rgba(255,255,255,0.02)}
.pl-row.sub{color:var(--muted2);font-size:13px;padding-left:28px}
.pl-row.sub:hover{background:var(--bg3);color:var(--text)}
.pl-row.total{
  font-weight:600;font-size:15px;padding:14px;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  margin-top:8px;background:var(--bg3)
}
.pl-header{
  display:grid;grid-template-columns:1fr 120px 120px 120px;
  padding:8px 14px;margin-bottom:4px;
  font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted)
}
.pl-val{text-align:right;font-variant-numeric:tabular-nums}
.pl-val.income{color:var(--income)}
.pl-val.expense{color:var(--expense)}
.pl-val.pos{color:var(--income)}
.pl-val.neg{color:var(--expense)}

/* ── Chart ── */
.chart-wrap{position:relative;height:240px}

/* ── Empty ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:500;color:var(--muted2);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--muted)}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;right:24px;padding:12px 18px;
  border-radius:var(--r);font-size:13px;z-index:999;
  opacity:0;transition:opacity 0.25s;pointer-events:none;
}
.toast.ok{background:#0f2a1a;border:1px solid #22c55e;color:var(--income)}
.toast.err{background:#2a0f0f;border:1px solid #ef4444;color:var(--expense)}
.toast.info{background:#1a1a2a;border:1px solid var(--accent);color:var(--accent)}
.toast.show{opacity:1}

/* ── Modal ── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:100;align-items:center;justify-content:center
}
.modal-bg.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);
  padding:28px;width:460px;max-width:92vw;max-height:85vh;overflow-y:auto
}
.modal h3{font-size:16px;font-weight:600;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;padding:9px 12px;background:var(--bg3);
  border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-size:13px;font-family:var(--font)
}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Progress bar ── */
.progress{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-bar{height:100%;border-radius:2px;background:var(--accent);transition:width 0.3s}
.progress-bar.income{background:var(--income)}
.progress-bar.expense{background:var(--expense)}

/* ── Scroll ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:900px){
  .body{grid-template-columns:1fr}
  .sidebar{display:none}
  .grid-4{grid-template-columns:1fr 1fr}
  .grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

<!-- Topbar -->
<div class="topbar">
  <div class="logo">семья<em>.</em>финансы</div>
  <div class="topbar-period">
    <select id="periodSelect" onchange="onPeriodChange()"></select>
    <button class="btn sm" onclick="showPage('upload')">+ Загрузить</button>
    <button class="btn sm" onclick="openGhModal()" title="Настройки GitHub">⚙</button><button class="btn sm primary" onclick="saveToGithub()">↑ Сохранить</button>
  </div>
</div>

<div class="body">
<!-- Sidebar -->
<div class="sidebar">
  <div class="nav-section">
    <div class="nav-label">Отчёты</div>
    <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
      <span class="icon">◈</span> Дашборд
    </div>
    <div class="nav-item" onclick="showPage('pl')" id="nav-pl">
      <span class="icon">≡</span> P&amp;L
    </div>
    <div class="nav-item" onclick="showPage('cashflow')" id="nav-cashflow">
      <span class="icon">⇅</span> Cash Flow
    </div>
    <div class="nav-item" onclick="showPage('balance')" id="nav-balance">
      <span class="icon">◎</span> Баланс
    </div>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-section">
    <div class="nav-label">Данные</div>
    <div class="nav-item" onclick="showPage('transactions')" id="nav-transactions">
      <span class="icon">☰</span> Операции
    </div>
    <div class="nav-item" onclick="showPage('upload')" id="nav-upload">
      <span class="icon">↑</span> Загрузить
    </div>
    <div class="nav-item" onclick="showPage('assets')" id="nav-assets">
      <span class="icon">◇</span> Активы и долги
    </div>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-section">
    <div class="nav-label">Периоды</div>
    <div class="period-list" id="periodList"></div>
  </div>
</div>

<!-- Content -->
<div class="content" id="mainContent">
  <!-- Pages rendered by JS -->
</div>
</div>
</div>

<!-- Modal: category edit -->
<div class="modal-bg" id="catModal">
  <div class="modal">
    <h3>Изменить категорию</h3>
    <div class="field">
      <label>Группа</label>
      <select id="catGroup" onchange="onCatGroupChange()"></select>
    </div>
    <div class="field">
      <label>Подкатегория</label>
      <select id="catSub"></select>
    </div>
    <div class="field">
      <label>Тип</label>
      <select id="catType">
        <option value="expense">Расход</option>
        <option value="income">Доход</option>
        <option value="transfer">Внутренний перевод</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeCatModal()">Отмена</button>
      <button class="btn primary" onclick="saveCatModal()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Modal: assets -->
<div class="modal-bg" id="assetsModal">
  <div class="modal">
    <h3>Активы и обязательства</h3>
    <div class="field"><label>Квартира (рыночная стоимость, ₽)</label><input type="number" id="assetFlat" placeholder="0"></div>
    <div class="field"><label>Машина (оценочная стоимость, ₽)</label><input type="number" id="assetCar" placeholder="0"></div>
    <div class="field"><label>Брокерский счёт (₽)</label><input type="number" id="assetBroker" placeholder="0"></div>
    <div class="field"><label>Торговый счёт (арбитраж, ₽)</label><input type="number" id="assetTrading" placeholder="0"></div>
    <div class="field"><label>Кэш на счетах (₽)</label><input type="number" id="assetCash" placeholder="0"></div>
    <div style="height:1px;background:var(--border);margin:16px 0"></div>
    <div class="field"><label>Остаток ипотеки (₽)</label><input type="number" id="liabMortgage" placeholder="0"></div>
    <div class="field"><label>Остаток рассрочки на обучение (₽)</label><input type="number" id="liabEdu" placeholder="0"></div>
    <div class="modal-actions">
      <button class="btn" onclick="document.getElementById('assetsModal').classList.remove('open')">Отмена</button>
      <button class="btn primary" onclick="saveAssets()">Сохранить</button>
    </div>
  </div>
</div>


<!-- Modal: GitHub settings -->
<div class="modal-bg" id="ghModal">
  <div class="modal">
    <h3>Настройки GitHub</h3>
    <div class="field"><label>GitHub Username</label><input type="text" id="ghUser" placeholder="iambescen"></div>
    <div class="field"><label>Репозиторий</label><input type="text" id="ghRepo" placeholder="finance-tracker"></div>
    <div class="field"><label>Personal Access Token</label><input type="password" id="ghTokenInput" placeholder="ghp_..."></div>
    <div class="modal-actions">
      <button class="btn" onclick="document.getElementById('ghModal').classList.remove('open')">Отмена</button>
      <button class="btn primary" onclick="saveGhModal()">Сохранить</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".csv,.xlsx,.xls" multiple style="display:none">

<script>
// ═══════════════════════════════════════════
// CATEGORY STRUCTURE (from Zen Money)
// ═══════════════════════════════════════════
const CAT_TREE = {
  income: {
    label: 'Доход',
    subs: ['Выручка от услуг/курсов/товаров','Дивиденды/купоны/курсовая разница',
           'Кэшбэк/проценты на остаток','Пособия/вычеты','Возвраты','Прочие доходы']
  },
  expense: {
    label: 'Расходы',
    groups: {
      'Питание':['Продукты/супермаркеты','Рестораны/кафе','Кино/концерты/мероприятия'],
      'Дети':['Детский сад/школа','Кружки/секции','Детские товары'],
      'Жильё':['Аренда/Ипотека (платёж)','Коммунальные/Интернет','Страховка жилья'],
      'Здоровье':['Визиты врача/платные услуги','Лекарства/аптека','Абонементы/тренажёрный','Страховка здоровья'],
      'Транспорт':['Такси/Общественный транспорт','Топливо','Обслуживание авто','Страховка авто'],
      'Покупки':['Одежда/обувь','Бытовая техника/электроника','Мебель/декор','Красота/уход','Книги/образование'],
      'Развлечения/Отдых':['Кино/концерты/мероприятия','Путешествия/отпуск','Хобби'],
      'Сервисы/Связь':['Мобильная связь','Подписки на сервисы','Интернет/хостинг','Банковские комиссии'],
      'Предпринимательство':['Оплата подрядчикам/сотрудникам','Рекламные расходы','Налоги/взносы ИП','Банковские комиссии ИП'],
      'Налоги/Взносы':['Взносы ИП','НДФЛ','УСН'],
      'Образование':['Оплата обучения','Курсы/тренинги'],
      'Прочее':['Подарки','Благотворительность','Прочие расходы'],
    }
  }
};

// Auto-categorization rules
const AUTO_RULES = [
  // Income
  {match:['зачисление','кэшбэк','бонус'], group:'Доход', sub:'Кэшбэк/проценты на остаток', type:'income'},
  {match:['дивиденд','купон'], group:'Доход', sub:'Дивиденды/купоны/курсовая разница', type:'income'},
  {match:['возврат'], group:'Доход', sub:'Возвраты', type:'income'},
  // Transfers
  {match:['между своими','own account','между счет'], group:'Перевод', sub:'Внутренний перевод', type:'transfer'},
  // Food
  {match:['пятёрочка','пятерочка','магнит','вкусвилл','перекрёсток','перекресток','лента','дикси','ашан','spar','metro cash','окей'], group:'Питание', sub:'Продукты/супермаркеты', type:'expense'},

function autoCateg(desc, bankCat) {
  const d = (desc||'').toLowerCase();
  const b = (bankCat||'').toLowerCase();
  for (const rule of AUTO_RULES) {
    if (rule.match.some(m => d.includes(m) || b.includes(m))) {
      return {group: rule.group, sub: rule.sub, type: rule.type};
    }
  }
  // Fallback by bank category
  const bankMap = {
    'супермаркеты':{group:'Питание',sub:'Продукты/супермаркеты',type:'expense'},
    'рестораны':{group:'Питание',sub:'Рестораны/кафе',type:'expense'},
    'такси':{group:'Транспорт',sub:'Такси/Общественный транспорт',type:'expense'},
    'местный транспорт':{group:'Транспорт',sub:'Такси/Общественный транспорт',type:'expense'},
    'отели':{group:'Развлечения/Отдых',sub:'Путешествия/отпуск',type:'expense'},
    'развлечения':{group:'Развлечения/Отдых',sub:'Кино/концерты/мероприятия',type:'expense'},
    'автоуслуги':{group:'Транспорт',sub:'Обслуживание авто',type:'expense'},
    'мобильная связь':{group:'Сервисы/Связь',sub:'Мобильная связь',type:'expense'},
    'связь':{group:'Сервисы/Связь',sub:'Интернет/хостинг',type:'expense'},
    'цифровые товары':{group:'Сервисы/Связь',sub:'Подписки на сервисы',type:'expense'},
    'финансы':{group:'Сервисы/Связь',sub:'Банковские комиссии',type:'expense'},
    'бонусы':{group:'Доход',sub:'Кэшбэк/проценты на остаток',type:'income'},
    'переводы':{group:'Перевод',sub:'Внутренний перевод',type:'transfer'},
  };
  if (bankMap[b]) return bankMap[b];
  return {group:'Прочее', sub:'Прочие расходы', type:'expense'};
}

// PARSING
// ═══════════════════════════════════════════
function parseAmount(s) {
  if (s == null) return 0;
  return parseFloat(String(s).replace(/\s/g,'').replace(',','.')) || 0;
}

function toISODate(raw) {
  if (!raw) return '';
  const s = String(raw).split(' ')[0];
  const p = s.split('.');
  if (p.length === 3 && p[2].length === 4) return `${p[2]}-${p[1]}-${p[0]}`;
  return s;
}

function detectBank(keys) {
  const k = keys.join('|').toLowerCase();
  if (k.includes('сумма операции') || k.includes('дата операции')) return 'tinkoff';
  return 'generic';
}

function parseTinkoff(rows) {
  return rows.map(r => {
    const dateRaw = r['Дата операции'] || '';
    const status  = r['Статус'] || '';
    const amtOp   = parseAmount(r['Сумма операции']);
    const curOp   = r['Валюта операции'] || 'RUB';
    const amtRub  = parseAmount(r['Сумма платежа']);
    const card    = r['Номер карты'] || '';
    const bankCat = r['Категория'] || '';
    const desc    = r['Описание'] || '';
    if (!dateRaw) return null;
    const date = toISODate(dateRaw);
    const month = date.slice(0,7);
    const c = autoCateg(desc, bankCat);
    return {
      id: uid(), date, month,
      dateDisplay: dateRaw.split(' ')[0],
      desc, card, bankCat,
      amtOp, curOp, amtRub,
      status,
      group: c.group, sub: c.sub, type: c.type,
      source: 'tinkoff'
    };
  }).filter(Boolean);
}

function parseGeneric(rows) {
  return rows.map(r => {
    const keys = Object.keys(r);
    let date='', desc='', amt=0, cat='';
    for (const k of keys) {
      const kl = k.toLowerCase();
      if (!date && kl.includes('дат')) date = r[k];
      if (!desc && (kl.includes('опис')||kl.includes('назн')||kl.includes('получ'))) desc = r[k];
      if (!amt && (kl.includes('сумм')||kl.includes('amount'))) amt = parseAmount(r[k]);
      if (!cat && (kl.includes('катег')||kl.includes('category'))) cat = r[k];
    }
    if (!date || !amt) return null;
    const dateISO = toISODate(date);
    const c = autoCateg(String(desc), cat);
    return {
      id: uid(), date: dateISO, month: dateISO.slice(0,7),
      dateDisplay: String(date).split(' ')[0],
      desc: String(desc), card:'', bankCat: cat,
      amtOp: amt, curOp:'RUB', amtRub: amt,
      status:'OK',
      group: c.group, sub: c.sub, type: c.type,
      source:'generic'
    };
  }).filter(Boolean);
}

function processRows(rows) {
  if (!rows?.length) return [];
  const bank = detectBank(Object.keys(rows[0]||{}));
  return bank === 'tinkoff' ? parseTinkoff(rows) : parseGeneric(rows);
}

function processFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (['xlsx','xls'].includes(ext)) {
    const fr = new FileReader();
    fr.onload = e => {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      ingestTransactions(processRows(XLSX.utils.sheet_to_json(ws)));
    };
    fr.readAsArrayBuffer(file);
  } else {
    const fr = new FileReader();
    fr.onload = e => {
      let res = Papa.parse(e.target.result, {header:true,delimiter:';',skipEmptyLines:true,encoding:'UTF-8'});
      if (!res.data?.length) res = Papa.parse(e.target.result, {header:true,skipEmptyLines:true});
      ingestTransactions(processRows(res.data));
    };
    fr.readAsText(file, 'UTF-8');
  }
}

function ingestTransactions(newTxns) {
  if (!newTxns.length) { toast('Нет данных в файле','err'); return; }
  // Group by month, deduplicate
  const byMonth = {};
  for (const t of newTxns) {
    if (!byMonth[t.month]) byMonth[t.month] = [];
    byMonth[t.month].push(t);
  }
  let added = 0;
  for (const [month, txns] of Object.entries(byMonth)) {
    const existing = getTransactions(month);
    const keys = new Set(existing.map(t => t.date+'|'+t.desc+'|'+t.amtOp));
    const deduped = txns.filter(t => !keys.has(t.date+'|'+t.desc+'|'+t.amtOp));
    const merged = [...existing, ...deduped].sort((a,b) => b.date.localeCompare(a.date));
    savePeriod(month, merged);
    added += deduped.length;
  }
  const months = Object.keys(byMonth);
  if (!currentPeriod && months.length) currentPeriod = months.sort().reverse()[0];
  refreshPeriodList();
  renderPage();
  toast(`Добавлено ${added} операций за ${months.join(', ')}`, 'ok');
}

function uid() { return Math.random().toString(36).slice(2,10); }

function fmtMoney(n, showSign=false) {
  const abs = Math.abs(n);
  const s = abs.toLocaleString('ru-RU', {minimumFractionDigits:0, maximumFractionDigits:0});
  if (showSign && n > 0) return '+' + s + ' ₽';
  if (n < 0) return '−' + s + ' ₽';
  return s + ' ₽';
}

function fmtMonthName(ym) {
  if (!ym) return '';
  const [y,m] = ym.split('-');
  const names = ['','Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  return `${names[+m]} ${y}`;
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-'+page);
  if (nav) nav.classList.add('active');
  renderPage();
}

function renderPage() {
  const c = document.getElementById('mainContent');
  if (currentPage === 'dashboard') c.innerHTML = pageDashboard();
  else if (currentPage === 'pl') c.innerHTML = pagePL();
  else if (currentPage === 'cashflow') c.innerHTML = pageCashflow();
  else if (currentPage === 'balance') c.innerHTML = pageBalance();
  else if (currentPage === 'transactions') c.innerHTML = pageTransactions();
  else if (currentPage === 'upload') c.innerHTML = pageUpload();
  else if (currentPage === 'assets') c.innerHTML = pageAssets();
  afterRender();
}

function afterRender() {
  // Destroy old charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  if (currentPage === 'dashboard') renderDashboardCharts();
  if (currentPage === 'transactions') bindTransactionEvents();
}

function pageDashboard() {
  const txns = getTransactions(currentPeriod).filter(t => t.type !== 'transfer');
  if (!txns.length && !currentPeriod) return pageEmpty();

  const income  = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amtRub,0);
  const expense = Math.abs(txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amtRub,0));
  const profit  = income - expense;

  // Compare prev month
  const periods = Object.keys(DB.periods).sort().reverse();
  const idx = periods.indexOf(currentPeriod);
  const prevPeriod = periods[idx+1];
  const prevTxns = prevPeriod ? getTransactions(prevPeriod).filter(t=>t.type!=='transfer') : [];
  const prevIncome  = prevTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amtRub,0);
  const prevExpense = Math.abs(prevTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amtRub,0));

  const deltaI = prevIncome  ? ((income-prevIncome)/prevIncome*100).toFixed(0) : null;
  const deltaE = prevExpense ? ((expense-prevExpense)/prevExpense*100).toFixed(0) : null;

  // Top expense categories
  const byCat = {};
  txns.filter(t=>t.type==='expense').forEach(t => {
    byCat[t.group] = (byCat[t.group]||0) + Math.abs(t.amtRub);
  });
  const topCats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,5);

  return `
<div class="page-header">
  <div class="page-title">Дашборд — ${fmtMonthName(currentPeriod)}</div>
</div>

<div class="grid-4">
  <div class="card-sm">
    <div class="metric-label">Доходы</div>
    <div class="metric-value income">${fmtMoney(income)}</div>
    ${deltaI !== null ? `<div class="delta ${+deltaI>=0?'up':'down'}">${+deltaI>=0?'↑':'↓'} ${Math.abs(deltaI)}% к прошлому мес.</div>` : ''}
  </div>
  <div class="card-sm">
    <div class="metric-label">Расходы</div>
    <div class="metric-value expense">${fmtMoney(expense)}</div>
    ${deltaE !== null ? `<div class="delta ${+deltaE<=0?'up':'down'}">${+deltaE<=0?'↓':'↑'} ${Math.abs(deltaE)}% к прошлому мес.</div>` : ''}
  </div>
  <div class="card-sm">
    <div class="metric-label">Чистый результат</div>
    <div class="metric-value ${profit>=0?'income':'expense'}">${fmtMoney(profit,true)}</div>
    <div class="metric-sub">Доходы минус расходы</div>
  </div>
  <div class="card-sm">
    <div class="metric-label">Операций</div>
    <div class="metric-value accent">${txns.length}</div>
    <div class="metric-sub">за ${fmtMonthName(currentPeriod)}</div>
  </div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-title">Расходы по категориям</div>
    <div class="chart-wrap"><canvas id="chartCats"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">Динамика по дням</div>
    <div class="chart-wrap"><canvas id="chartDays"></canvas></div>
  </div>
</div>

<div class="card">
  <div class="card-title">Топ расходных категорий</div>
  ${topCats.map(([cat,amt]) => `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:13px">${cat}</span>
          <span style="font-size:13px;color:var(--expense)">${fmtMoney(amt)}</span>
        </div>
        <div class="progress"><div class="progress-bar expense" style="width:${Math.min(100,(amt/expense*100)).toFixed(0)}%"></div></div>
      </div>
    </div>
  `).join('')}
</div>`;
}

// ─── P&L ───
function pagePL() {
  const txns = getTransactions(currentPeriod).filter(t=>t.type!=='transfer');
  if (!txns.length) return pageEmpty();

  const income  = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amtRub,0);
  const expense = Math.abs(txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amtRub,0));
  const profit  = income - expense;

  // Income breakdown
  const incomeBySub = {};
  txns.filter(t=>t.type==='income').forEach(t => {
    incomeBySub[t.sub] = (incomeBySub[t.sub]||0) + t.amtRub;
  });

  // Expense breakdown by group → sub
  const expByGroup = {};
  txns.filter(t=>t.type==='expense').forEach(t => {
    if (!expByGroup[t.group]) expByGroup[t.group] = {};
    expByGroup[t.group][t.sub] = (expByGroup[t.group][t.sub]||0) + Math.abs(t.amtRub);
  });

  // Previous period
  const periods = Object.keys(DB.periods).sort().reverse();
  const prevPeriod = periods[periods.indexOf(currentPeriod)+1];
  const prevTxns = prevPeriod ? getTransactions(prevPeriod).filter(t=>t.type!=='transfer') : [];

  function prevAmt(type, group, sub) {
    return Math.abs(prevTxns.filter(t =>
      t.type===type && (!group||t.group===group) && (!sub||t.sub===sub)
    ).reduce((s,t)=>s+(type==='income'?t.amtRub:Math.abs(t.amtRub)),0));
  }

  const prevIncome  = prevAmt('income');
  const prevExpense = prevAmt('expense');

  function plVal(cur, prev, isExpense=false) {
    const cls = isExpense ? (cur>0?'expense':'') : (cur>0?'income':'expense');
    const sign = isExpense ? '−' : (cur>0?'+':'');
    const prevStr = prev ? `<span style="color:var(--muted);font-size:11px">${fmtMoney(prev)}</span>` : '';
    return `<div class="pl-val ${cls}">${cur ? (sign + Math.abs(cur).toLocaleString('ru-RU',{maximumFractionDigits:0}) + ' ₽') : '—'}</div>${prevStr}`;
  }

  let expRows = '';
  for (const [group, subs] of Object.entries(expByGroup)) {
    const groupTotal = Object.values(subs).reduce((s,v)=>s+v,0);
    const prevGroup = prevAmt('expense', group);
    expRows += `
      <div class="pl-row group">
        <div>${group}</div>
        <div class="pl-val expense">${fmtMoney(groupTotal)}</div>
        <div class="pl-val" style="color:var(--muted);font-size:12px">${prevGroup ? fmtMoney(prevGroup) : '—'}</div>
        <div class="pl-val" style="color:var(--muted);font-size:12px">${prevGroup ? (((groupTotal-prevGroup)/prevGroup*100)>0?'+':'')+((groupTotal-prevGroup)/prevGroup*100).toFixed(0)+'%' : '—'}</div>
      </div>`;
    for (const [sub, amt] of Object.entries(subs).sort((a,b)=>b[1]-a[1])) {
      const prevSub = prevAmt('expense', group, sub);
      expRows += `
        <div class="pl-row sub">
          <div>${sub}</div>
          <div class="pl-val expense">${fmtMoney(amt)}</div>
          <div class="pl-val" style="color:var(--muted);font-size:12px">${prevSub ? fmtMoney(prevSub) : '—'}</div>
          <div class="pl-val"></div>
        </div>`;
    }
  }

  let incRows = '';
  for (const [sub, amt] of Object.entries(incomeBySub).sort((a,b)=>b[1]-a[1])) {
    incRows += `
      <div class="pl-row sub">
        <div>${sub}</div>
        <div class="pl-val income">+${amt.toLocaleString('ru-RU',{maximumFractionDigits:0})} ₽</div>
        <div class="pl-val" style="color:var(--muted);font-size:12px">—</div>

function pageCashflow() {
  const txns = getTransactions(currentPeriod);
  if (!txns.length) return pageEmpty();

  // Operational: income & everyday expenses
  const opIncomeGroups = ['Доход'];
  const opExpGroups = ['Питание','Дети','Жильё','Здоровье','Покупки','Развлечения/Отдых','Сервисы/Связь','Прочее','Образование'];
  const investGroups = ['Инвестиции'];
  const finGroups    = ['Предпринимательство','Налоги/Взносы'];

  function sumGroups(groups, type) {
    return Math.abs(txns.filter(t => t.type===type && groups.includes(t.group)).reduce((s,t)=>s+t.amtRub,0));
  }

  const opIncome  = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amtRub,0);
  const opExpense = Math.abs(txns.filter(t=>t.type==='expense' && opExpGroups.includes(t.group)).reduce((s,t)=>s+t.amtRub,0));
  const finExpense= Math.abs(txns.filter(t=>t.type==='expense' && finGroups.includes(t.group)).reduce((s,t)=>s+t.amtRub,0));
  const transfers = txns.filter(t=>t.type==='transfer');

  const opFlow   = opIncome - opExpense;
  const finFlow  = -finExpense;
  const totalFlow = opFlow + finFlow;

  function flowRow(label, amt, sub=false) {
    const cls = amt>=0?'income':'expense';
    return `<div class="pl-row ${sub?'sub':'group'}">
      <div>${label}</div>
      <div class="pl-val ${cls}">${fmtMoney(amt,true)}</div>
      <div></div><div></div>
    </div>`;
  }

  return `
<div class="page-header">
  <div class="page-title">Cash Flow — ${fmtMonthName(currentPeriod)}</div>
</div>

<div class="card" style="margin-bottom:16px">
  <div class="pl-header">

    <div>Операционная деятельность</div><div></div><div></div><div></div>
  </div>
  ${flowRow('Доходы', opIncome, true)}
  ${flowRow('Операционные расходы', -opExpense, true)}
  <div class="pl-row group">
    <div>Операционный поток</div>
    <div class="pl-val ${opFlow>=0?'pos':'neg'}">${fmtMoney(opFlow,true)}</div>
    <div></div><div></div>
  </div>

  <div style="height:8px"></div>
  <div class="pl-row group" style="font-size:13px;color:var(--muted);padding:10px 14px 4px">
    <div>Финансовая деятельность</div><div></div><div></div><div></div>
  </div>
  ${flowRow('Предпринимательство / Налоги', -finExpense, true)}
  <div class="pl-row group">
    <div>Финансовый поток</div>
    <div class="pl-val ${finFlow>=0?'pos':'neg'}">${fmtMoney(finFlow,true)}</div>
    <div></div><div></div>
  </div>

  <div style="height:8px"></div>
  <div class="pl-row group" style="font-size:13px;color:var(--muted);padding:10px 14px 4px">
    <div>Внутренние переводы</div><div></div><div></div><div></div>
  </div>
  <div class="pl-row sub">
    <div>Переводы между своими счетами</div>
    <div class="pl-val" style="color:var(--transfer)">${transfers.length} операций</div>

}

function filterTable() {
  const search = (document.getElementById('txSearch')?.value||'').toLowerCase();
  const group  = document.getElementById('txGroup')?.value||'';
  const type   = document.getElementById('txType')?.value||'';
  const txns   = getTransactions(currentPeriod);

  const filtered = txns.filter(t => {
    if (search && !t.desc.toLowerCase().includes(search) && !t.group.toLowerCase().includes(search) && !t.sub.toLowerCase().includes(search)) return false;
    if (group && t.group !== group) return false;
    if (type  && t.type  !== type)  return false;
    return true;
  });

  const body = document.getElementById('txBody');
  if (!body) return;
  body.innerHTML = filtered.map(t => {
    const isIncome   = t.type==='income';
    const isTransfer = t.type==='transfer';
    const amtClass   = isTransfer?'amt-transfer':isIncome?'amt-income':'amt-expense';
    const sign       = isIncome?'+':'';
    const opStr      = t.curOp!=='RUB' ? `${sign}${Math.abs(t.amtOp).toLocaleString('ru-RU',{maximumFractionDigits:2})} ${t.curOp}` : '—';
    return `<tr>
      <td style="color:var(--muted);white-space:nowrap">${t.dateDisplay}</td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.desc}">${t.desc}</td>
      <td><span class="type-tag ${t.type}">${t.type==='income'?'Доход':t.type==='expense'?'Расход':'Перевод'}</span></td>
      <td><span class="cat-pill ${isTransfer?'transfer':''}" data-txid="${t.id}" title="${t.group} / ${t.sub}">${t.group}</span></td>
      <td style="text-align:right" class="${amtClass}">${opStr}</td>
      <td style="text-align:right" class="${amtClass}">${sign}${Math.abs(t.amtRub).toLocaleString('ru-RU',{maximumFractionDigits:0})} ₽</td>
    </tr>`;
  }).join('');

  const cnt = document.getElementById('txCount');
  if (cnt) cnt.textContent = `${filtered.length} из ${txns.length}`;
}

function refreshPeriodList() {
  const periods = Object.keys(DB.periods).sort().reverse();

  // Period select in topbar
  const sel = document.getElementById('periodSelect');
  const prev = sel.value;
  sel.innerHTML = periods.map(p => `<option value="${p}">${fmtMonthName(p)}</option>`).join('');
  if (prev && periods.includes(prev)) sel.value = prev;
  else if (periods.length) { sel.value = periods[0]; currentPeriod = periods[0]; }

  // Period list in sidebar
  const list = document.getElementById('periodList');
  list.innerHTML = periods.map(p => {
    const cnt = getTransactions(p).length;
    return `<div class="period-item ${p===currentPeriod?'active':''}" onclick="selectPeriod('${p}')">
      ${fmtMonthName(p)}<span class="badge">${cnt}</span>
    </div>`;
  }).join('');
}

function onPeriodChange() {
  currentPeriod = document.getElementById('periodSelect').value;
  refreshPeriodList();
  renderPage();
}

function selectPeriod(p) {
  currentPeriod = p;
  document.getElementById('periodSelect').value = p;
  refreshPeriodList();
  renderPage();
}

function deletePeriod(p) {
  if (!confirm(`Удалить данные за ${fmtMonthName(p)}?`)) return;
  delete DB.periods[p];
  if (currentPeriod === p) {
    const periods = Object.keys(DB.periods).sort().reverse();
    currentPeriod = periods[0] || null;
  }
  saveLocal();
  refreshPeriodList();
  renderPage();
}

function openCatModal(txId) {
  editingTxId = txId;
  const tx = getTransactions(currentPeriod).find(t=>t.id===txId);
  if (!tx) return;

  const groupSel = document.getElementById('catGroup');
  const subSel   = document.getElementById('catSub');
  const typeSel  = document.getElementById('catType');

  // Build groups
  const allGroups = ['Доход', ...Object.keys(CAT_TREE.expense.groups), 'Перевод', 'Прочее'];
  groupSel.innerHTML = allGroups.map(g=>`<option value="${g}">${g}</option>`).join('');
  groupSel.value = tx.group;
  onCatGroupChange();
  subSel.value = tx.sub;
  typeSel.value = tx.type;

  document.getElementById('catModal').classList.add('open');
}

function onCatGroupChange() {
  const group = document.getElementById('catGroup').value;
  const subSel = document.getElementById('catSub');
  let subs = [];
  if (group === 'Доход') subs = CAT_TREE.income.subs;
  else if (group === 'Перевод') subs = ['Внутренний перевод'];
  else subs = CAT_TREE.expense.groups[group] || ['Прочее'];
  subSel.innerHTML = subs.map(s=>`<option value="${s}">${s}</option>`).join('');
}

function saveCatModal() {
  const txns = getTransactions(currentPeriod);

    tx.type  = document.getElementById('catType').value;
    savePeriod(currentPeriod, txns);
    bindTransactionEvents();

// GITHUB SAVE
// ═══════════════════════════════════════════
function ghCfg() {
  return {
    user:  localStorage.getItem('gh_user')  || 'iambescen',
    repo:  localStorage.getItem('gh_repo')  || 'finance-tracker',
    token: localStorage.getItem('gh_token') || ''
  };
}

async function githubPut(path, content, msg) {
  const b64 = btoa(unescape(encodeURIComponent(content)));
  const check = await fetch(`https://api.github.com/repos/${ghCfg().user}/${ghCfg().repo}/contents/${path}`, {
    headers:{Authorization:`token ${ghCfg().token}`,Accept:'application/vnd.github.v3+json'}
  });
  const body = {message: msg, content: b64};
  if (check.ok) { const j = await check.json(); body.sha = j.sha; }
  return fetch(`https://api.github.com/repos/${ghCfg().user}/${ghCfg().repo}/contents/${path}`, {
    method:'PUT',
    headers:{Authorization:`token ${GH_TOKEN}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
}

async function saveToGithub() {
  const btn = document.querySelector('.btn.primary[onclick="saveToGithub()"]');
  if (btn) { btn.textContent = 'Сохраняем...'; btn.disabled = true; }
  try {
    const date = new Date().toLocaleDateString('ru-RU');
    // Save each period
    for (const [period, data] of Object.entries(DB.periods)) {
      const res = await githubPut(`data/${period}.json`, JSON.stringify(data, null, 2), `Update ${period} — ${date}`);
      if (!res.ok) { const j=await res.json(); throw new Error(j.message); }
    }
    // Save assets
    await githubPut('data/assets.json', JSON.stringify(DB.assets, null, 2), `Update assets — ${date}`);
    toast('Всё сохранено в GitHub ✓','ok');
  } catch(e) {
    toast('Ошибка: '+e.message,'err');
  }
  if (btn) { btn.textContent = '↑ Сохранить'; btn.disabled = false; }
}

// ═══════════════════════════════════════════
// LOCAL STORAGE
// ═══════════════════════════════════════════
function saveLocal() {
  try { localStorage.setItem('family_finance_db', JSON.stringify(DB)); } catch(e) {}
}

function loadLocal() {
  try {
    const raw = localStorage.getItem('family_finance_db');
    if (raw) {
      DB = JSON.parse(raw);
      DB.assets = DB.assets || {flat:0,car:0,broker:0,trading:0,cash:0,mortgage:0,eduLoan:0,updatedAt:null};
    }
  } catch(e) {}
}

async function loadFromGithub() {
  try {
    // Load assets
    const ar = await fetch(`https://raw.githubusercontent.com/${ghCfg().user}/${ghCfg().repo}/main/data/assets.json`);
    if (ar.ok) DB.assets = await ar.json();
    // List data files
    const lr = await fetch(`https://api.github.com/repos/${ghCfg().user}/${ghCfg().repo}/contents/data`, {
      headers:{Authorization:`token ${ghCfg().token}`}
    });
    if (lr.ok) {
      const files = await lr.json();
      for (const f of files) {
        if (f.name.match(/^\d{4}-\d{2}\.json$/)) {
          const dr = await fetch(f.download_url);
          if (dr.ok) {
            const period = f.name.replace('.json','');
            DB.periods[period] = await dr.json();
          }
        }
      }
    }
    const periods = Object.keys(DB.periods).sort().reverse();
    if (periods.length) currentPeriod = periods[0];
    saveLocal();
    refreshPeriodList();
    renderPage();
  } catch(e) {}
}

// ═══════════════════════════════════════════
// FILE DROP
// ═══════════════════════════════════════════
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  [...e.dataTransfer.files].forEach(processFile);
});
document.getElementById('fileInput').addEventListener('change', e => {
  [...e.target.files].forEach(processFile);
  e.target.value = '';
});
document.addEventListener('click', e => {
  if (e.target.id === 'uploadArea' || e.target.closest('#uploadArea')) {
    if (!e.target.closest('button')) document.getElementById('fileInput').click();
  }
});
document.getElementById('catModal').addEventListener('click', e => {
  if (e.target===document.getElementById('catModal')) closeCatModal();
});
document.getElementById('assetsModal').addEventListener('click', e => {
  if (e.target===document.getElementById('assetsModal')) document.getElementById('assetsModal').classList.remove('open');
});

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3500);
}


function openGhModal() {
  const c = ghCfg();
  document.getElementById('ghUser').value = c.user;
  document.getElementById('ghRepo').value = c.repo;
  document.getElementById('ghTokenInput').value = c.token;
  document.getElementById('ghModal').classList.add('open');
}
function saveGhModal() {
  localStorage.setItem('gh_user',  document.getElementById('ghUser').value.trim());
  localStorage.setItem('gh_repo',  document.getElementById('ghRepo').value.trim());
  localStorage.setItem('gh_token', document.getElementById('ghTokenInput').value.trim());
  document.getElementById('ghModal').classList.remove('open');
  toast('Настройки GitHub сохранены','ok');
}
// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadLocal();
const periods = Object.keys(DB.periods).sort().reverse();
if (periods.length) currentPeriod = periods[0];
refreshPeriodList();
renderPage();
// Load from GitHub on start
loadFromGithub();
</script>
