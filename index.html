<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Семейные финансы</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
  --border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--muted:#666;--muted2:#888;
  --accent:#6366f1;--accent-soft:rgba(99,102,241,0.12);
  --income:#22c55e;--income-soft:rgba(34,197,94,0.1);
  --expense:#ef4444;--expense-soft:rgba(239,68,68,0.1);
  --transfer:#f59e0b;--transfer-soft:rgba(245,158,11,0.1);
  --r:8px;--r2:12px;--font:'Inter',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
.app{display:grid;grid-template-rows:56px 1fr;height:100vh}
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg2)}
.logo{font-size:15px;font-weight:600;letter-spacing:-0.3px}.logo em{color:var(--accent);font-style:normal}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.body{display:grid;grid-template-columns:210px 1fr;overflow:hidden}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:12px 0;overflow-y:auto}
.content{overflow-y:auto;padding:24px}
.nav-label{font-size:10px;font-weight:500;letter-spacing:0.8px;color:var(--muted);text-transform:uppercase;padding:8px 12px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;margin:0 8px 1px;border-radius:var(--r);cursor:pointer;color:var(--muted2);font-size:13px;transition:all 0.15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}.nav-item.active{background:var(--accent-soft);color:var(--accent)}
.nav-divider{height:1px;background:var(--border);margin:8px 12px}
.period-list{padding:0 8px}
.period-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--muted2);transition:all 0.15s;margin-bottom:1px}
.period-item:hover{background:var(--bg3);color:var(--text)}.period-item.active{background:var(--accent-soft);color:var(--accent)}
.badge{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--bg4);color:var(--muted)}
.period-item.active .badge{background:var(--accent-soft);color:var(--accent)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:16px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.card-title{font-size:11px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px}
.metric-value{font-size:22px;font-weight:600;letter-spacing:-0.5px}
.metric-sub{font-size:12px;color:var(--muted);margin-top:4px}
.metric-value.income{color:var(--income)}.metric-value.expense{color:var(--expense)}.metric-value.accent{color:var(--accent)}
.delta{font-size:12px;margin-top:4px}.delta.up{color:var(--income)}.delta.down{color:var(--expense)}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.page-actions{display:flex;gap:8px;align-items:center}
.btn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;transition:all 0.15s;font-family:var(--font);display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--border2);background:var(--bg4)}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn.primary:hover{opacity:0.9}
.btn.sm{padding:5px 10px;font-size:12px}.btn.danger{border-color:#7f1d1d;color:var(--expense)}.btn.danger:hover{background:var(--expense-soft)}
.upload-area{border:1.5px dashed var(--border2);border-radius:var(--r2);padding:40px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg2)}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:var(--accent-soft)}
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:16px}
.tbl-toolbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tbl-toolbar input,.tbl-toolbar select{padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font)}
.tbl-toolbar input:focus,.tbl-toolbar select:focus{outline:none;border-color:var(--accent)}
.tbl-count{margin-left:auto;font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500}
td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(255,255,255,0.015)}
.amt-income{color:var(--income);font-weight:500}.amt-expense{color:var(--expense);font-weight:500}.amt-transfer{color:var(--transfer);font-weight:500}
.cat-pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:12px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-pill:hover{border-color:var(--accent);color:var(--accent)}.cat-pill.transfer{background:var(--transfer-soft);border-color:rgba(245,158,11,0.2);color:var(--transfer)}
.type-tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.type-tag.income{background:var(--income-soft);color:var(--income)}.type-tag.expense{background:var(--expense-soft);color:var(--expense)}.type-tag.transfer{background:var(--transfer-soft);color:var(--transfer)}
.pl-header{display:grid;grid-template-columns:1fr 130px 130px 80px;padding:8px 14px;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted)}
.pl-row{display:grid;grid-template-columns:1fr 130px 130px 80px;padding:8px 14px;border-radius:var(--r);transition:background 0.1s}
.pl-row:hover{background:var(--bg3)}.pl-row.group{font-weight:500}.pl-row.sub{color:var(--muted2);font-size:13px;padding-left:28px}
.pl-row.total{font-weight:600;font-size:15px;padding:14px;border-top:1px solid var(--border);margin-top:8px;background:var(--bg3);border-radius:0 0 var(--r2) var(--r2)}
.pl-val{text-align:right;font-variant-numeric:tabular-nums}
.pl-val.income{color:var(--income)}.pl-val.expense{color:var(--expense)}.pl-val.pos{color:var(--income)}.pl-val.neg{color:var(--expense)}
.chart-wrap{position:relative;height:240px}
.progress{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-bar{height:100%;border-radius:2px;background:var(--accent)}.progress-bar.expense{background:var(--expense)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.owner-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.owner-me{background:rgba(99,102,241,0.15);color:var(--accent)}
.owner-wife{background:rgba(236,72,153,0.15);color:#ec4899}
.owner-joint{background:rgba(34,197,94,0.1);color:var(--income)}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:var(--r);font-size:13px;z-index:999;opacity:0;transition:opacity 0.25s;pointer-events:none}
.toast.ok{background:#0f2a1a;border:1px solid #22c55e;color:var(--income)}.toast.err{background:#2a0f0f;border:1px solid #ef4444;color:var(--expense)}.toast.info{background:#1a1a2a;border:1px solid var(--accent);color:var(--accent)}.toast.show{opacity:1}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center}.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:28px;width:480px;max-width:92vw;max-height:88vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:20px}
.field{margin-bottom:14px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font)}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.rule-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border-radius:var(--r);margin-bottom:6px;font-size:12px}
.rule-row .rule-text{flex:1;color:var(--muted2)}.rule-row .rule-cat{color:var(--accent)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:900px){.body{grid-template-columns:1fr}.sidebar{display:none}.grid-4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="logo">семья<em>.</em>финансы</div>
  <div class="topbar-right">
    <select id="periodSelect" onchange="onPeriodChange()" style="padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font)"></select>
    <button class="btn sm" onclick="showPage('upload')">+ Загрузить</button>
    <button class="btn sm" onclick="openGhModal()">⚙</button>
    <button class="btn sm primary" onclick="saveToGithub()">↑ GitHub</button>
  </div>
</div>
<div class="body">
  <div class="sidebar">
    <div class="nav-label">Отчёты</div>
    <div class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard')">◈ Дашборд</div>
    <div class="nav-item" id="nav-pl" onclick="showPage('pl')">≡ P&amp;L</div>
    <div class="nav-item" id="nav-cashflow" onclick="showPage('cashflow')">⇅ Cash Flow</div>
    <div class="nav-item" id="nav-balance" onclick="showPage('balance')">◎ Баланс</div>
    <div class="nav-divider"></div>
    <div class="nav-label">Данные</div>
    <div class="nav-item" id="nav-transactions" onclick="showPage('transactions')">☰ Операции</div>
    <div class="nav-item" id="nav-upload" onclick="showPage('upload')">↑ Загрузить</div>
    <div class="nav-item" id="nav-accounts" onclick="showPage('accounts')">▣ Счета</div>
    <div class="nav-item" id="nav-rules" onclick="showPage('rules')">◎ Правила</div>
    <div class="nav-item" id="nav-assets" onclick="showPage('assets')">◇ Активы и долги</div>
    <div class="nav-divider"></div>
    <div class="nav-label">Периоды</div>
    <div class="period-list" id="periodList"></div>
  </div>
  <div class="content" id="mainContent"></div>
</div>
</div>

<!-- Cat modal -->
<div class="modal-bg" id="catModal">
  <div class="modal">
    <h3>Категория операции</h3>
    <div id="catTxInfo" style="background:var(--bg3);border-radius:var(--r);padding:10px 12px;margin-bottom:16px;font-size:13px;color:var(--muted2)"></div>
    <div class="field"><label>Группа</label><select id="catGroup" onchange="onCatGroupChange()"></select></div>
    <div class="field"><label>Подкатегория</label><select id="catSub"></select></div>
    <div class="field"><label>Тип</label>
      <select id="catType"><option value="expense">Расход</option><option value="income">Доход</option><option value="transfer">Внутренний перевод</option></select>
    </div>
    <div style="background:var(--bg3);border-radius:var(--r);padding:12px;margin-top:4px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Запомнить правило</div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-bottom:6px">
        <input type="checkbox" id="ruleByInn"> По ИНН контрагента (рекомендуется для постоянных клиентов)
      </label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="ruleByKeyword"> По ключевому слову в описании:
        <input type="text" id="ruleKeyword" placeholder="ключевое слово" style="flex:1;padding:4px 8px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;font-family:var(--font)">
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeCatModal()">Отмена</button>
      <button class="btn primary" onclick="saveCatModal(false)">Сохранить</button>
      <button class="btn primary" onclick="saveCatModal(true)" style="background:#059669;border-color:#059669">Применить ко всем</button>
    </div>
  </div>
</div>

<!-- Assets modal -->
<div class="modal-bg" id="assetsModal">
  <div class="modal">
    <h3>Активы и обязательства</h3>
    <div class="field"><label>Квартира (рыночная стоимость, ₽)</label><input type="number" id="aFlat" placeholder="0"></div>
    <div class="field"><label>Машина (оценочная стоимость, ₽)</label><input type="number" id="aCar" placeholder="0"></div>
    <div class="field"><label>Брокерский счёт (₽)</label><input type="number" id="aBroker" placeholder="0"></div>
    <div class="field"><label>Торговый счёт (арбитраж, ₽)</label><input type="number" id="aTrading" placeholder="0"></div>
    <div class="field"><label>Кэш на счетах (суммарно, ₽)</label><input type="number" id="aCash" placeholder="0"></div>
    <div style="height:1px;background:var(--border);margin:16px 0"></div>
    <div class="field"><label>Остаток ипотеки (₽)</label><input type="number" id="lMortgage" placeholder="0"></div>
    <div class="field"><label>Рассрочка на обучение (₽)</label><input type="number" id="lEdu" placeholder="0"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('assetsModal')">Отмена</button>
      <button class="btn primary" onclick="saveAssets()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Account edit modal -->
<div class="modal-bg" id="accModal">
  <div class="modal">
    <h3>Настройка счёта</h3>
    <div class="field"><label>Номер счёта</label><input type="text" id="accNum" readonly style="color:var(--muted)"></div>
    <div class="field"><label>Название (как отображать)</label><input type="text" id="accName" placeholder="Например: ИП Тинькофф основной"></div>
    <div class="field"><label>Банк</label><input type="text" id="accBank" placeholder="Тинькофф"></div>
    <div class="field"><label>Владелец</label>
      <select id="accOwner">
        <option value="me">Я (Влад)</option>
        <option value="wife">Таня</option>
        <option value="joint">Общий</option>
      </select>
    </div>
    <div class="field"><label>Тип счёта</label>
      <select id="accType">
        <option value="personal">Личный</option>
        <option value="business">ИП / Бизнес</option>
        <option value="investment">Инвестиционный</option>
        <option value="trading">Торговый (арбитраж)</option>
        <option value="cash">Наличные</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('accModal')">Отмена</button>
      <button class="btn primary" onclick="saveAccount()">Сохранить</button>
    </div>
  </div>
</div>

<!-- GitHub modal -->
<div class="modal-bg" id="ghModal">
  <div class="modal">
    <h3>Настройки GitHub</h3>
    <div class="field"><label>Username</label><input type="text" id="ghUser" placeholder="iambescen"></div>
    <div class="field"><label>Репозиторий</label><input type="text" id="ghRepo" placeholder="finance-tracker"></div>
    <div class="field"><label>Personal Access Token</label><input type="password" id="ghToken" placeholder="ghp_..."></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('ghModal')">Отмена</button>
      <button class="btn primary" onclick="saveGhModal()">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".csv,.xlsx,.xls" multiple style="display:none">
</body>
</html>
<script>
// ═══ CONSTANTS ═══
const OWN_INN = '570701153846';

// ═══ HELPERS ═══
function uid(){return Math.random().toString(36).slice(2,10)}
function parseAmt(s){if(!s)return 0;return parseFloat(String(s).replace(/\s/g,'').replace(',','.').replace(/[^\d.-]/g,''))||0}
function toISO(raw){const s=String(raw||'').split(' ')[0];const p=s.split('.');if(p.length===3&&p[2].length===4)return p[2]+'-'+p[1]+'-'+p[0];return s}
function fmtMoney(n,sign=false){const a=Math.abs(n),s=a.toLocaleString('ru-RU',{maximumFractionDigits:0});if(sign&&n>0)return '+'+s+' ₽';if(n<0)return '−'+s+' ₽';return s+' ₽'}
function fmtMonth(ym){if(!ym)return '';const[y,m]=ym.split('-');return ['','Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'][+m]+' '+y}
function closeModal(id){document.getElementById(id).classList.remove('open')}

// ═══ CATEGORIZATION ═══
function applyRules(desc, bankCat, inn) {
  const d=(desc||'').toLowerCase(), b=(bankCat||'').toLowerCase();
  // User rules first (by INN)
  if(inn && DB.rules.byInn[inn]) {
    const r=DB.rules.byInn[inn];
    return {g:r.group, s:r.sub, t:r.type};
  }
  // User rules by keyword
  for(const [kw, r] of Object.entries(DB.rules.byKeyword)) {
    if(d.includes(kw.toLowerCase())) return {g:r.group, s:r.sub, t:r.type};
  }
  // Built-in rules
  for(const r of AUTO_RULES){if(r.m.some(m=>d.includes(m)||b.includes(m)))return{g:r.g,s:r.s,t:r.t}}
  if(BANK_CAT_MAP[b]){const c=BANK_CAT_MAP[b];return{g:c.g,s:c.s,t:c.t}}
  return{g:'Прочее',s:'Прочие расходы',t:'expense'}
}

// ═══ PARSERS ═══
function parseTinkoff(rows) {
  return rows.map(r=>{
    const dateRaw=r['Дата операции']||'';if(!dateRaw)return null;
    const amtOp=parseAmt(r['Сумма операции']),amtRub=parseAmt(r['Сумма платежа']);
    const curOp=r['Валюта операции']||'RUB',desc=r['Описание']||'',bankCat=r['Категория']||'',card=r['Номер карты']||'';
    const date=toISO(dateRaw),month=date.slice(0,7);
    const c=applyRules(desc,bankCat,'');
    return{id:uid(),date,month,dateDisplay:dateRaw.split(' ')[0],desc,card,account:card.replace(/\*/g,''),bankCat,amtOp,curOp,amtRub,status:r['Статус']||'',group:c.g,sub:c.s,type:c.t,source:'tinkoff',counterparty:'',counterpartyInn:''};
  }).filter(Boolean)
}

function parseTinkoffBusiness(rows) {
  return rows.map(r=>{
    const acc=(r['Номер счёта']||'').trim();
    const opType=(r['Тип операции (пополнение/списание)']||'').trim();
    const dateRaw=(r['Дата проведения']||'').trim();if(!dateRaw)return null;
    const amt=parseAmt(r['Сумма в валюте счёта']);if(!amt)return null;
    const cur=(r['Валюта счёта']||'RUB').trim();
    const desc=(r['Описание операции']||r['Назначение платежа']||'').trim();
    const payerAcc=(r['Счет плательщика']||'').trim();
    const payerINN=(r['ИНН плательщика']||'').trim();
    const rcvAcc=(r['Счет получателя']||'').trim();
    const ctgAcc=(r['Счет контрагента']||'').trim();
    const ctgINN=(r['ИНН контрагента']||'').trim();
    const ctgName=(r['Наименование контрагента']||'').trim();
    const date=toISO(dateRaw),month=date.slice(0,7);
    const isCredit=opType==='Кредит';
    const dLow=desc.toLowerCase();
    // Transfer detection: only if counterparty is own account/INN
    const isOwnTransfer=
      (ctgINN&&ctgINN===OWN_INN)||
      (payerINN&&payerINN===OWN_INN&&isCredit)||
      OWN_ACCOUNTS.has(ctgAcc)||OWN_ACCOUNTS.has(payerAcc)||OWN_ACCOUNTS.has(rcvAcc)||
      dLow.includes('перевод собственных средств');
    const isServiceFee=dLow.includes('плата за обслуживание счета');
    const isTax=dLow.includes('пополнение енс')||dLow.includes('казначейство')||dLow.includes('взнос')||dLow.includes('усн');
    let type,group,sub;
    const contragentInn=isCredit?payerINN:ctgINN;
    if(isOwnTransfer){type='transfer';group='Перевод';sub='Внутренний перевод';}
    else if(isServiceFee){type='expense';group='Предпринимательство';sub='Банковские комиссии ИП';}
    else if(isTax){type='expense';group='Предпринимательство';sub='Налоги/взносы ИП';}
    else if(isCredit){
      // External credit = income, check user rules first
      const userRule=contragentInn&&DB.rules.byInn[contragentInn];
      if(userRule){type=userRule.type;group=userRule.group;sub=userRule.sub;}
      else{type='income';group='Доход';sub='Выручка от услуг/курсов/товаров';}
    }
    else{const c=applyRules(desc,'',contragentInn);type=c.t;group=c.g;sub=c.s;}
    const amtRub=isCredit?amt:-amt;
    return{id:uid(),date,month,dateDisplay:dateRaw,desc:desc||ctgName,card:'*'+acc.slice(-4),account:acc,bankCat:opType,amtOp:amtRub,curOp:cur,amtRub,status:'OK',group,sub,type,source:'tinkoff_business',counterparty:ctgName,counterpartyInn:contragentInn};
  }).filter(Boolean)
}

function parseGeneric(rows){
  return rows.map(r=>{
    const keys=Object.keys(r);let date='',desc='',amt=0,cat='';
    for(const k of keys){const kl=k.toLowerCase();
      if(!date&&kl.includes('дат'))date=r[k];
      if(!desc&&(kl.includes('опис')||kl.includes('назн')))desc=r[k];
      if(!amt&&(kl.includes('сумм')||kl.includes('amount')))amt=parseAmt(r[k]);
      if(!cat&&kl.includes('катег'))cat=r[k];
    }
    if(!date||!amt)return null;
    const dateISO=toISO(date),c=applyRules(String(desc),cat,'');
    return{id:uid(),date:dateISO,month:dateISO.slice(0,7),dateDisplay:String(date).split(' ')[0],desc:String(desc),card:'',account:'',bankCat:cat,amtOp:amt,curOp:'RUB',amtRub:amt,status:'OK',group:c.g,sub:c.s,type:c.t,source:'generic',counterparty:'',counterpartyInn:''};
  }).filter(Boolean)
}

function detectBank(keys){
  const k=keys.join('|').toLowerCase();
  if(k.includes('тип операции')&&k.includes('дата проведения')&&k.includes('номер счёта'))return 'tinkoff_business';
  if(k.includes('дата операции')||k.includes('сумма операции'))return 'tinkoff';
  return 'generic';
}
function processRows(rows){
  if(!rows?.length)return[];
  const bank=detectBank(Object.keys(rows[0]||{}));
  if(bank==='tinkoff_business')return parseTinkoffBusiness(rows);
  if(bank==='tinkoff')return parseTinkoff(rows);
  return parseGeneric(rows);
}

// ═══ FILE PROCESSING ═══
function processFile(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(['xlsx','xls'].includes(ext)){
    const fr=new FileReader();
    fr.onload=e=>{const wb=XLSX.read(e.target.result,{type:'array'});ingest(processRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])));};
    fr.readAsArrayBuffer(file);
  }else{
    const fr=new FileReader();
    fr.onload=e=>{
      let res=Papa.parse(e.target.result,{header:true,delimiter:';',skipEmptyLines:true,encoding:'UTF-8'});
      if(!res.data?.length)res=Papa.parse(e.target.result,{header:true,skipEmptyLines:true});
      ingest(processRows(res.data));
    };
    fr.readAsText(file,'UTF-8');
  }
}

function ingest(newTxns){
  if(!newTxns.length){toast('Нет данных в файле','err');return}
  // Register new accounts
  newTxns.forEach(t=>{
    if(t.account&&!DB.accounts[t.account]){
      DB.accounts[t.account]={name:'',bank:t.source==='tinkoff_business'?'Тинькофф Бизнес':'Тинькофф',owner:'me',type:t.source==='tinkoff_business'?'business':'personal'};
    }
  });
  const byMonth={};
  for(const t of newTxns){if(!byMonth[t.month])byMonth[t.month]=[];byMonth[t.month].push(t)}
  let added=0;
  for(const[month,txns]of Object.entries(byMonth)){
    const existing=getTxns(month);
    const keys=new Set(existing.map(t=>t.date+'|'+t.desc+'|'+t.amtOp));
    const deduped=txns.filter(t=>!keys.has(t.date+'|'+t.desc+'|'+t.amtOp));
    savePeriod(month,[...existing,...deduped].sort((a,b)=>b.date.localeCompare(a.date)));
    added+=deduped.length;
  }
  const months=Object.keys(byMonth);
  if(!currentPeriod&&months.length)currentPeriod=months.sort().reverse()[0];
  saveLocal();refreshUI();
  toast('Добавлено '+added+' операций за '+months.join(', '),'ok');
}

// ═══ RULES ENGINE ═══
function applyAllRules(){
  // Re-categorize all transactions using current rules
  let changed=0;
  for(const[period,data]of Object.entries(DB.periods)){
    const txns=data.transactions||[];
    txns.forEach(t=>{
      if(t.type==='transfer')return; // skip manually set transfers
      const c=applyRules(t.desc,t.bankCat,t.counterpartyInn);
      // Only update if not manually overridden (we track manualCat flag)
      if(!t.manualCat&&(t.group!==c.g||t.sub!==c.s||t.type!==c.t)){
        t.group=c.g;t.sub=c.s;t.type=c.t;changed++;
      }
    });
    data.transactions=txns;
  }
  saveLocal();
  return changed;
}

function pageDash(){
  const range=document.getElementById('dashRange')?.value||'month';
  const allP=Object.keys(DB.periods).sort().reverse();
  let selP=[currentPeriod];
  if(range==='quarter'){const[y,m]=currentPeriod.split('-').map(Number),qs=m-((m-1)%3);selP=allP.filter(p=>{const[py,pm]=p.split('-').map(Number);return py===y&&pm>=qs&&pm<qs+3});}
  else if(range==='year'){const y=currentPeriod.split('-')[0];selP=allP.filter(p=>p.startsWith(y));}
  else if(range==='all')selP=allP;
  const label=range==='month'?fmtMonth(currentPeriod):range==='quarter'?'Q'+Math.ceil(+currentPeriod.split('-')[1]/3)+' '+currentPeriod.split('-')[0]:range==='year'?currentPeriod.split('-')[0]:'Всё время';
  const txns=selP.flatMap(p=>getTxns(p)).filter(t=>t.type!=='transfer');
  const income=txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amtRub,0);
  const expense=Math.abs(txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amtRub,0));
  const profit=income-expense;
  const prevP=allP[allP.indexOf(currentPeriod)+1];
  const prevTxns=range==='month'&&prevP?getTxns(prevP).filter(t=>t.type!=='transfer'):[];
  const pI=prevTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amtRub,0);
  const pE=Math.abs(prevTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amtRub,0));
  const dI=pI?((income-pI)/pI*100).toFixed(0):null;
  const dE=pE?((expense-pE)/pE*100).toFixed(0):null;
  const byCat={};txns.filter(t=>t.type==='expense').forEach(t=>{byCat[t.group]=(byCat[t.group]||0)+Math.abs(t.amtRub)});
  const topCats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const monthlyRows=selP.length>1?selP.sort().map(p=>{
    const pt=getTxns(p).filter(t=>t.type!=='transfer');
    const inc=pt.filter(t=>t.type==='income').reduce((s,t)=>s+t.amtRub,0);
    const exp=Math.abs(pt.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amtRub,0));
    const res=inc-exp;
    return '<tr><td style="cursor:pointer;color:var(--accent)" onclick="selectPeriod(\''+p+'\')">'+fmtMonth(p)+'</td>'
      +'<td style="text-align:right" class="amt-income">+'+inc.toLocaleString('ru-RU',{maximumFractionDigits:0})+' ₽</td>'
      +'<td style="text-align:right" class="amt-expense">'+fmtMoney(exp)+'</td>'
      +'<td style="text-align:right" class="'+(res>=0?'amt-income':'amt-expense')+'">'+fmtMoney(res,true)+'</td></tr>';
  }).join(''):'';
  return '<div class="page-header"><div class="page-title">Дашборд — '+label+'</div>'
    +'<div class="page-actions"><select id="dashRange" onchange="renderPage()" style="padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font)">'
    +'<option value="month">Месяц</option><option value="quarter">Квартал</option><option value="year">Год</option><option value="all">Всё время</option></select></div></div>'
    +'<div class="grid-4">'
    +'<div class="card-sm"><div class="metric-label">Доходы</div><div class="metric-value income">'+fmtMoney(income)+'</div>'+(dI!==null?'<div class="delta '+(+dI>=0?'up':'down')+'">'+(+dI>=0?'↑':'↓')+Math.abs(dI)+'% к пред.</div>':'')+'</div>'
    +'<div class="card-sm"><div class="metric-label">Расходы</div><div class="metric-value expense">'+fmtMoney(expense)+'</div>'+(dE!==null?'<div class="delta '+(+dE<=0?'up':'down')+'">'+(+dE<=0?'↓':'↑')+Math.abs(dE)+'% к пред.</div>':'')+'</div>'
    +'<div class="card-sm"><div class="metric-label">Чистый результат</div><div class="metric-value '+(profit>=0?'income':'expense')+'">'+fmtMoney(profit,true)+'</div></div>'
    +'<div class="card-sm"><div class="metric-label">Операций</div><div class="metric-value accent">'+txns.length+'</div><div class="metric-sub">без переводов</div></div></div>'
    +'<div class="grid-2"><div class="card" style="margin-bottom:0"><div class="card-title">По категориям (расходы)</div><div class="chart-wrap"><canvas id="chartCats"></canvas></div></div>'
    +'<div class="card" style="margin-bottom:0"><div class="card-title">'+(selP.length>1?'По месяцам':'По дням')+'</div><div class="chart-wrap"><canvas id="chartDays"></canvas></div></div></div>'
    +(topCats.length?'<div class="card"><div class="card-title">Топ категорий расходов</div>'+topCats.map(([cat,amt])=>'<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>'+cat+'</span><span style="color:var(--expense)">'+fmtMoney(amt)+'</span></div><div class="progress"><div class="progress-bar expense" style="width:'+Math.min(100,amt/expense*100).toFixed(0)+'%"></div></div></div></div>').join('')+'</div>':'')
    +(monthlyRows?'<div class="card"><div class="card-title">По месяцам</div><table><thead><tr><th>Месяц</th><th style="text-align:right">Доходы</th><th style="text-align:right">Расходы</th><th style="text-align:right">Результат</th></tr></thead><tbody>'+monthlyRows+'</tbody></table></div>':'');
}

  else if(range==='year'){const y=currentPeriod.split('-')[0];selP=allP.filter(p=>p.startsWith(y));}
  else if(range==='all')selP=allP;

  if(selP.length>1){

    charts.days=new Chart(cd,{type:'bar',data:{labels:sorted.map(fmtMonth),datasets:[{label:'Доходы',data:sorted.map(p=>Math.round(getTxns(p).filter(t=>t.type==='income').reduce((s,t)=>s+t.amtRub,0))),backgroundColor:'rgba(34,197,94,0.7)',borderRadius:3},{label:'Расходы',data:sorted.map(p=>Math.round(Math.abs(getTxns(p).filter(t=>t.type==='expense').reduce((s,t)=>s+t.amtRub,0)))),backgroundColor:'rgba(239,68,68,0.7)',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#555',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}}},plugins:{legend:{labels:{color:'#666',font:{size:11}}}}}});
  }else{
    const byDay={};txns.forEach(t=>{if(!byDay[t.date])byDay[t.date]={inc:0,exp:0};if(t.type==='income')byDay[t.date].inc+=t.amtRub;else byDay[t.date].exp+=Math.abs(t.amtRub)});
    const days=Object.keys(byDay).sort();
    charts.days=new Chart(cd,{type:'bar',data:{labels:days.map(d=>d.slice(8)),datasets:[{label:'Доходы',data:days.map(d=>Math.round(byDay[d].inc)),backgroundColor:'rgba(34,197,94,0.7)',borderRadius:3},{label:'Расходы',data:days.map(d=>Math.round(byDay[d].exp)),backgroundColor:'rgba(239,68,68,0.7)',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#555',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}}},plugins:{legend:{labels:{color:'#666',font:{size:11}}}}}});

// ═══ P&L ═══
function pagePL(){
  const txns=getTxns(currentPeriod).filter(t=>t.type!=='transfer');
  if(!txns.length)return pageEmpty();
  const income=txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amtRub,0);
  const expense=Math.abs(txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amtRub,0));
  const profit=income-expense;
  const allP=Object.keys(DB.periods).sort().reverse();
  const prevP=allP[allP.indexOf(currentPeriod)+1];
  const prevTxns=prevP?getTxns(prevP).filter(t=>t.type!=='transfer'):[];
  const pI=prevTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amtRub,0);
  const pE=Math.abs(prevTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amtRub,0));
  const incBySub={};txns.filter(t=>t.type==='income').forEach(t=>{incBySub[t.sub]=(incBySub[t.sub]||0)+t.amtRub});
  const expByGroup={};txns.filter(t=>t.type==='expense').forEach(t=>{if(!expByGroup[t.group])expByGroup[t.group]={};expByGroup[t.group][t.sub]=(expByGroup[t.group][t.sub]||0)+Math.abs(t.amtRub)});
  function pAmt(type,group,sub){return Math.abs(prevTxns.filter(t=>t.type===type&&(!group||t.group===group)&&(!sub||t.sub===sub)).reduce((s,t)=>s+(type==='income'?t.amtRub:Math.abs(t.amtRub)),0))}
  let incRows='';
  for(const[sub,amt]of Object.entries(incBySub).sort((a,b)=>b[1]-a[1]))incRows+='<div class="pl-row sub"><div>'+sub+'</div><div class="pl-val income">+'+amt.toLocaleString('ru-RU',{maximumFractionDigits:0})+' ₽</div><div class="pl-val" style="color:var(--muted);font-size:12px">—</div><div></div></div>';
  let expRows='';
  for(const[group,subs]of Object.entries(expByGroup)){
    const gt=Object.values(subs).reduce((s,v)=>s+v,0),pg=pAmt('expense',group);
    const delta=pg?((gt-pg)/pg*100).toFixed(0):null;
    expRows+='<div class="pl-row group"><div>'+group+'</div><div class="pl-val expense">'+fmtMoney(gt)+'</div><div class="pl-val" style="color:var(--muted);font-size:12px">'+(pg?fmtMoney(pg):'—')+'</div><div class="pl-val" style="color:var(--muted);font-size:12px">'+(delta!==null?(+delta>0?'+':'')+delta+'%':'—')+'</div></div>';
    for(const[sub,amt]of Object.entries(subs).sort((a,b)=>b[1]-a[1]))expRows+='<div class="pl-row sub"><div>'+sub+'</div><div class="pl-val expense">'+fmtMoney(amt)+'</div><div class="pl-val" style="color:var(--muted);font-size:12px">—</div><div></div></div>';
  }
  return '<div class="page-header"><div class="page-title">P&L — '+fmtMonth(currentPeriod)+'</div></div>'
    +'<div class="card"><div class="pl-header"><div>Статья</div><div style="text-align:right">'+fmtMonth(currentPeriod)+'</div><div style="text-align:right">'+(prevP?fmtMonth(prevP):'Пред. период')+'</div><div style="text-align:right">Δ%</div></div>'
    +'<div class="pl-row group" style="color:var(--income)"><div>Доходы</div><div class="pl-val income">+'+income.toLocaleString('ru-RU',{maximumFractionDigits:0})+' ₽</div><div class="pl-val" style="color:var(--muted);font-size:12px">'+(pI?fmtMoney(pI):'—')+'</div><div class="pl-val" style="color:var(--muted);font-size:12px">'+(pI?((income-pI)/pI*100>0?'+':'')+((income-pI)/pI*100).toFixed(0)+'%':'—')+'</div></div>'
    +incRows+'<div style="height:10px"></div>'
    +'<div class="pl-row group" style="color:var(--expense)"><div>Расходы</div><div class="pl-val expense">'+fmtMoney(expense)+'</div><div class="pl-val" style="color:var(--muted);font-size:12px">'+(pE?fmtMoney(pE):'—')+'</div><div class="pl-val" style="color:var(--muted);font-size:12px">'+(pE?((expense-pE)/pE*100>0?'+':'')+((expense-pE)/pE*100).toFixed(0)+'%':'—')+'</div></div>'
    +expRows
    +'<div class="pl-row total"><div>Чистый результат</div><div class="pl-val '+(profit>=0?'pos':'neg')+'">'+fmtMoney(profit,true)+'</div><div class="pl-val" style="color:var(--muted);font-size:12px">'+(pI||pE?fmtMoney(pI-pE,true):'—')+'</div><div></div></div></div>';
}

// ═══ CASH FLOW ═══
function pageCF(){
  const txns=getTxns(currentPeriod);if(!txns.length)return pageEmpty();
  const opExpGroups=['Питание','Дети','Жильё','Здоровье','Покупки','Развлечения/Отдых','Сервисы/Связь','Прочее','Образование'];
  const finGroups=['Предпринимательство'];
  const opIncome=txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amtRub,0);
  const opExpense=Math.abs(txns.filter(t=>t.type==='expense'&&opExpGroups.includes(t.group)).reduce((s,t)=>s+t.amtRub,0));
  const finExpense=Math.abs(txns.filter(t=>t.type==='expense'&&finGroups.includes(t.group)).reduce((s,t)=>s+t.amtRub,0));
  const transfers=txns.filter(t=>t.type==='transfer');
  const opFlow=opIncome-opExpense,finFlow=-finExpense,total=opFlow+finFlow;
  function row(label,amt,sub=false){return '<div class="pl-row '+(sub?'sub':'group')+'"><div>'+label+'</div><div class="pl-val '+(amt>=0?'pos':'neg')+'">'+fmtMoney(amt,true)+'</div><div></div><div></div></div>'}
  return '<div class="page-header"><div class="page-title">Cash Flow — '+fmtMonth(currentPeriod)+'</div></div>'
    +'<div class="card"><div class="pl-header"><div>Поток</div><div style="text-align:right">Сумма</div><div></div><div></div></div>'
    +'<div class="pl-row group" style="color:var(--muted);font-size:12px;padding:8px 14px 2px"><div>Операционная деятельность</div><div></div><div></div><div></div></div>'
    +row('Доходы (выручка)',opIncome,true)+row('Операционные расходы',-opExpense,true)+row('Операционный поток',opFlow)
    +'<div style="height:8px"></div><div class="pl-row group" style="color:var(--muted);font-size:12px;padding:8px 14px 2px"><div>Финансовая деятельность</div><div></div><div></div><div></div></div>'
    +row('Предпринимательство / налоги',-finExpense,true)+row('Финансовый поток',finFlow)
    +'<div style="height:8px"></div><div class="pl-row sub"><div>Внутренние переводы (исключены из расчётов)</div><div class="pl-val" style="color:var(--transfer)">'+transfers.length+' операций</div><div></div><div></div></div>'
    +'<div class="pl-row total"><div>Итого денежный поток</div><div class="pl-val '+(total>=0?'pos':'neg')+'">'+fmtMoney(total,true)+'</div><div></div><div></div></div></div>';
}

function pageTxns(){

  return '<div class="page-header"><div class="page-title">Операции — '+fmtMonth(currentPeriod)+'</div></div>'
    +'<div class="tbl-wrap"><div class="tbl-toolbar">'
    +'<input type="text" id="txSearch" placeholder="Поиск..." oninput="filterTxns()">'
    +'<select id="txGroup" onchange="filterTxns()"><option value="">Все категории</option>'+groups.map(g=>'<option>'+g+'</option>').join('')+'</select>'
    +'<select id="txType" onchange="filterTxns()"><option value="">Все типы</option><option value="income">Доходы</option><option value="expense">Расходы</option><option value="transfer">Переводы</option></select>'
    +'<span class="tbl-count" id="txCount"></span></div>'
    +'<table><thead><tr><th>Дата</th><th>Описание</th><th>Контрагент</th><th>Тип</th><th>Категория</th><th style="text-align:right">Сумма ₽</th></tr></thead><tbody id="txBody"></tbody></table></div>';

function bindTxnEvents(){
  filterTxns();
  document.getElementById('txBody').addEventListener('click',e=>{const c=e.target.closest('[data-id]');if(c)openCatModal(c.dataset.id);});
}

function filterTxns(){
  const search=(document.getElementById('txSearch')?.value||'').toLowerCase();
  const group=document.getElementById('txGroup')?.value||'';
  const type=document.getElementById('txType')?.value||'';
  const txns=getTxns(currentPeriod).filter(t=>{
    if(search&&!t.desc.toLowerCase().includes(search)&&!t.group.toLowerCase().includes(search)&&!(t.counterparty||'').toLowerCase().includes(search))return false;
    if(group&&t.group!==group)return false;
    if(type&&t.type!==type)return false;
    return true;
  });
  const body=document.getElementById('txBody');if(!body)return;
  body.innerHTML=txns.map(t=>{
    const isI=t.type==='income',isT=t.type==='transfer';
    const cls=isT?'amt-transfer':isI?'amt-income':'amt-expense';
    const sign=isI?'+':'';
    const manualMark=t.manualCat?'<span style="color:var(--accent);font-size:10px" title="Категория задана вручную"> ✎</span>':'';
    return '<tr><td style="color:var(--muted);white-space:nowrap">'+t.dateDisplay+'</td>'
      +'<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+t.desc+'">'+t.desc+'</td>'
      +'<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted2);font-size:12px">'+(t.counterparty||'—')+'</td>'
      +'<td><span class="type-tag '+t.type+'">'+(isI?'Доход':isT?'Перевод':'Расход')+'</span></td>'
      +'<td><span class="cat-pill '+(isT?'transfer':'')+'" data-id="'+t.id+'">'+t.group+manualMark+'</span></td>'
      +'<td style="text-align:right" class="'+cls+'">'+sign+Math.abs(t.amtRub).toLocaleString('ru-RU',{maximumFractionDigits:0})+' ₽</td></tr>';
  }).join('');
  const cnt=document.getElementById('txCount');if(cnt)cnt.textContent=txns.length+' из '+getTxns(currentPeriod).length;
}

        +'<td><button class="btn sm" onclick="openAccModal(\''+num+'\')">Изменить</button></td></tr>';

function openCatModal(txId){

  const tx=getTxns(currentPeriod).find(t=>t.id===txId);if(!tx)return;
  editTxCopy=tx;
  document.getElementById('catTxInfo').innerHTML='<b>'+tx.desc+'</b>'+(tx.counterparty?' · '+tx.counterparty:'')+(tx.counterpartyInn?' · ИНН '+tx.counterpartyInn:'');
  const gs=document.getElementById('catGroup');
  const allGroups=['Доход',...Object.keys(CAT_TREE.expense.groups),'Перевод'];
  gs.innerHTML=allGroups.map(g=>'<option value="'+g+'">'+g+'</option>').join('');
  gs.value=tx.group;onCatGroupChange();
  document.getElementById('catSub').value=tx.sub;
  document.getElementById('catType').value=tx.type;
  document.getElementById('ruleByInn').checked=false;
  document.getElementById('ruleByKeyword').checked=false;
  document.getElementById('ruleKeyword').value='';
  if(tx.counterpartyInn)document.getElementById('ruleByInn').parentElement.style.display='flex';
  else document.getElementById('ruleByInn').parentElement.style.display='none';
  document.getElementById('catModal').classList.add('open');
}

function onCatGroupChange(){
  const g=document.getElementById('catGroup').value;
  const subs=g==='Доход'?CAT_TREE.income.subs:g==='Перевод'?['Внутренний перевод']:CAT_TREE.expense.groups[g]||['Прочее'];
  document.getElementById('catSub').innerHTML=subs.map(s=>'<option>'+s+'</option>').join('');
}

function saveCatModal(applyAll){
  const newGroup=document.getElementById('catGroup').value;
  const newSub=document.getElementById('catSub').value;
  const newType=document.getElementById('catType').value;
  const byInn=document.getElementById('ruleByInn').checked;
  const byKw=document.getElementById('ruleByKeyword').checked;
  const kw=document.getElementById('ruleKeyword').value.trim();
  const ruleData={group:newGroup,sub:newSub,type:newType};
  // Save rules
  if(byInn&&editTxCopy?.counterpartyInn){
    DB.rules.byInn[editTxCopy.counterpartyInn]={...ruleData,name:editTxCopy.counterparty||''};
    toast('Правило по ИНН сохранено','info');
  }
  if(byKw&&kw){
    DB.rules.byKeyword[kw]=ruleData;
    toast('Правило по ключевому слову сохранено','info');
  }
  if(applyAll){
    // Apply to all transactions matching rules
    let changed=0;
    const targetDesc=editTxCopy?.desc?.toLowerCase()||'';
    const targetInn=editTxCopy?.counterpartyInn||'';
    for(const[period,data]of Object.entries(DB.periods)){
      (data.transactions||[]).forEach(t=>{
        const match=(targetInn&&t.counterpartyInn===targetInn)||(targetDesc&&t.desc.toLowerCase()===targetDesc);
        if(match){t.group=newGroup;t.sub=newSub;t.type=newType;t.manualCat=true;changed++;}
      });
    }
    saveLocal();toast('Применено к '+changed+' операциям','ok');
  }else{
    // Apply only to this transaction
    const txns=getTxns(currentPeriod);
    const tx=txns.find(t=>t.id===editTxId);
    if(tx){tx.group=newGroup;tx.sub=newSub;tx.type=newType;tx.manualCat=true;savePeriod(currentPeriod,txns);}
  }
  saveLocal();closeCatModal();filterTxns();
}

function closeCatModal(){document.getElementById('catModal').classList.remove('open');editTxId=null;editTxCopy=null;}

// ═══ ACCOUNT MODAL ═══
let editAccNum=null;

  document.getElementById('accName').value=acc.name||'';
  document.getElementById('accBank').value=acc.bank||'';
  document.getElementById('accOwner').value=acc.owner||'me';

    name:document.getElementById('accName').value.trim(),
    bank:document.getElementById('accBank').value.trim(),
    owner:document.getElementById('accOwner').value,

// ═══ ASSETS MODAL ═══

  ['aFlat','aCar','aBroker','aTrading','aCash','lMortgage','lEdu'].forEach((id,i)=>{

// ═══ GITHUB ═══
function ghCfg(){return{user:localStorage.getItem('gh_user')||'iambescen',repo:localStorage.getItem('gh_repo')||'finance-tracker',token:localStorage.getItem('gh_token')||''}}
function openGhModal(){const c=ghCfg();document.getElementById('ghUser').value=c.user;document.getElementById('ghRepo').value=c.repo;document.getElementById('ghToken').value=c.token;document.getElementById('ghModal').classList.add('open');}
function saveGhModal(){localStorage.setItem('gh_user',document.getElementById('ghUser').value.trim());localStorage.setItem('gh_repo',document.getElementById('ghRepo').value.trim());localStorage.setItem('gh_token',document.getElementById('ghToken').value.trim());closeModal('ghModal');toast('Настройки сохранены','ok');}

async function ghPut(path,content,msg){
  const{user,repo,token}=ghCfg();
  const b64=btoa(unescape(encodeURIComponent(content)));
  const check=await fetch('https://api.github.com/repos/'+user+'/'+repo+'/contents/'+path,{headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}});
  const body={message:msg,content:b64};
  if(check.ok){const j=await check.json();body.sha=j.sha;}
  return fetch('https://api.github.com/repos/'+user+'/'+repo+'/contents/'+path,{method:'PUT',headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
}

async function saveToGithub(){
  const{token}=ghCfg();
  if(!token){toast('Введите токен GitHub (кнопка ⚙)','err');openGhModal();return;}
  const btn=document.querySelector('[onclick="saveToGithub()"]');
  if(btn){btn.textContent='Сохраняем...';btn.disabled=true;}
  try{
    const date=new Date().toLocaleDateString('ru-RU');
    for(const[period,data]of Object.entries(DB.periods)){
      const res=await ghPut('data/'+period+'.json',JSON.stringify(data,null,2),'Update '+period+' — '+date);
      if(!res.ok){const j=await res.json();throw new Error(j.message);}
    }
    await ghPut('data/assets.json',JSON.stringify(DB.assets,null,2),'Update assets — '+date);
    await ghPut('data/accounts.json',JSON.stringify(DB.accounts,null,2),'Update accounts — '+date);
    await ghPut('data/rules.json',JSON.stringify(DB.rules,null,2),'Update rules — '+date);
    toast('Всё сохранено в GitHub ✓','ok');
  }catch(e){toast('Ошибка: '+e.message,'err');}
  if(btn){btn.textContent='↑ GitHub';btn.disabled=false;}
}

async function loadFromGithub(){
  const{user,repo,token}=ghCfg();if(!token)return;
  try{
    const base='https://raw.githubusercontent.com/'+user+'/'+repo+'/main/data/';
    const ar=await fetch(base+'assets.json');if(ar.ok)DB.assets=await ar.json();
    const rr=await fetch(base+'rules.json');if(rr.ok)DB.rules=await rr.json();
    const acr=await fetch(base+'accounts.json');if(acr.ok)DB.accounts=await acr.json();
    const lr=await fetch('https://api.github.com/repos/'+user+'/'+repo+'/contents/data',{headers:{Authorization:'token '+token}});
    if(lr.ok){
      const files=await lr.json();
      for(const f of files){
        if(f.name.match(/^\d{4}-\d{2}\.json$/)){const dr=await fetch(f.download_url);if(dr.ok)DB.periods[f.name.replace('.json','')]=await dr.json();}
      }
    }
    const p=Object.keys(DB.periods).sort().reverse();if(p.length)currentPeriod=p[0];
    saveLocal();refreshUI();
  }catch(e){}
}

// ═══ PERIOD MANAGEMENT ═══
function refreshUI(){
  const periods=Object.keys(DB.periods).sort().reverse();
  const sel=document.getElementById('periodSelect');
  const prev=sel.value;
  sel.innerHTML=periods.map(p=>'<option value="'+p+'">'+fmtMonth(p)+'</option>').join('');
  if(prev&&periods.includes(prev))sel.value=prev;
  else if(periods.length){sel.value=periods[0];currentPeriod=periods[0];}
  document.getElementById('periodList').innerHTML=periods.map(p=>'<div class="period-item '+(p===currentPeriod?'active':'')+'" onclick="selectPeriod(\''+p+'\')">'+fmtMonth(p)+'<span class="badge">'+getTxns(p).length+'</span></div>').join('');
  renderPage();
}
function onPeriodChange(){currentPeriod=document.getElementById('periodSelect').value;refreshUI();}
function selectPeriod(p){currentPeriod=p;document.getElementById('periodSelect').value=p;refreshUI();}
function delPeriod(p){if(!confirm('Удалить '+fmtMonth(p)+'?'))return;delete DB.periods[p];if(currentPeriod===p){const ps=Object.keys(DB.periods).sort().reverse();currentPeriod=ps[0]||null;}saveLocal();refreshUI();}

// ═══ STORAGE ═══
function saveLocal(){try{localStorage.setItem('ff_db',JSON.stringify(DB));}catch(e){}}
function loadLocal(){
  try{
    const d=localStorage.getItem('ff_db');
    if(d){
      const parsed=JSON.parse(d);
      DB={...DB,...parsed};
      DB.assets=DB.assets||{flat:0,car:0,broker:0,trading:0,cash:0,mortgage:0,eduLoan:0,updatedAt:null};
      DB.rules=DB.rules||{byInn:{},byKeyword:{}};
      DB.accounts=DB.accounts||{};
    }
  }catch(e){}
}

// ═══ TOAST ═══
function toast(msg,type='info'){const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+type+' show';setTimeout(()=>el.classList.remove('show'),3500);}

// ═══ EVENTS ═══
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();[...e.dataTransfer.files].forEach(processFile);});
document.getElementById('fileInput').addEventListener('change',e=>{[...e.target.files].forEach(processFile);e.target.value='';});
document.addEventListener('click',e=>{
  if((e.target.id==='uploadArea'||e.target.closest('#uploadArea'))&&!e.target.closest('button'))document.getElementById('fileInput').click();
  if(e.target===document.getElementById('catModal'))closeCatModal();
  ['assetsModal','accModal','ghModal'].forEach(id=>{if(e.target===document.getElementById(id))closeModal(id);});
});

// ═══ INIT ═══
loadLocal();
const initP=Object.keys(DB.periods).sort().reverse();
if(initP.length)currentPeriod=initP[0];
refreshUI();
loadFromGithub();
</script>
